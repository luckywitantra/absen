<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - Aicha HC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; }
        #map { height: 250px; width: 100%; border-radius: 1rem; margin-bottom: 1rem; z-index: 1;}
        .tab-btn.active { color: #fff; background: #0f172a; border-color: #0f172a; }
    </style>
</head>
<body class="p-6 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">AICHA HQ MANAGER</h1>
                <p class="text-slate-500 font-bold text-sm">Control Panel Outlet & Shift Scheduling</p>
            </div>
            <div class="flex gap-2">
                <button onclick="bukaModal('modal-outlet')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700">+ Tambah Outlet Baru</button>
                <button onclick="bukaModal('modal-shift')" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-emerald-700">+ Buat Jadwal Shift</button>
            </div>
        </header>

        <!-- PANEL LAPORAN -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6 p-4">
            <div class="flex gap-3 mb-4">
                <select id="filter-outlet" class="bg-slate-50 border p-3 rounded-lg font-bold outline-none flex-1">
                    <option value="Semua">Semua Outlet</option>
                    <option value="Outlet Pusat">Outlet Pusat</option>
                    <option value="Penajam">Penajam</option>
                </select>
                <button onclick="loadData()" class="bg-slate-900 text-white px-6 py-3 rounded-lg font-bold">Tarik Data Absen</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-slate-100 text-slate-500 font-bold uppercase text-[10px]">
                        <tr><th class="p-4">Tgl & Jam</th><th class="p-4">Karyawan</th><th class="p-4">Lokasi & Shift</th><th class="p-4">Tipe</th><th class="p-4">Status Keterlambatan</th></tr>
                    </thead>
                    <tbody id="table-body" class="text-slate-700 font-medium divide-y divide-slate-100">
                        <tr><td colspan="5" class="p-6 text-center italic text-slate-400">Pilih outlet dan tarik data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL: TAMBAH OUTLET -->
    <div id="modal-outlet" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl">
            <h2 class="text-lg font-black mb-2">Buat Lokasi Outlet Baru</h2>
            <div id="map"></div>
            <p class="text-[10px] text-slate-500 mb-3 text-center font-bold">Geser & Zoom Peta, lalu Klik lokasi toko Anda.</p>
            <input type="text" id="out-nama" placeholder="Nama Outlet (Misal: Ai-cha Sudirman)" class="w-full p-3 bg-slate-50 border rounded-lg mb-2 text-sm font-bold outline-none">
            <div class="grid grid-cols-2 gap-2 mb-2">
                <input type="text" id="out-lat" readonly placeholder="Latitude" class="w-full p-2 bg-slate-100 border rounded-lg text-xs outline-none">
                <input type="text" id="out-lng" readonly placeholder="Longitude" class="w-full p-2 bg-slate-100 border rounded-lg text-xs outline-none">
            </div>
            <input type="number" id="out-rad" placeholder="Batas Radius Aman (Meter) - Rekomendasi: 50" class="w-full p-3 bg-slate-50 border rounded-lg mb-4 text-sm font-bold outline-none">
            <div class="flex gap-2">
                <button onclick="tutupModal('modal-outlet')" class="w-full py-3 bg-slate-200 font-bold rounded-lg">Batal</button>
                <button onclick="simpanOutlet()" class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg">Simpan Lokasi</button>
            </div>
        </div>
    </div>

    <!-- MODAL: TAMBAH SHIFT -->
    <div id="modal-shift" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="text-lg font-black mb-4">Buat Jadwal Shift Baru</h2>
            <select id="shf-outlet" class="w-full p-3 bg-slate-50 border rounded-lg mb-3 text-sm font-bold outline-none">
                <!-- Dropdown ini harus Anda sesuaikan/bisa dibuat dinamis baca DB -->
                <option value="Outlet Pusat">Outlet Pusat</option>
                <option value="Penajam">Penajam</option>
            </select>
            <input type="text" id="shf-nama" placeholder="Nama Shift (Misal: Pagi / Middle)" class="w-full p-3 bg-slate-50 border rounded-lg mb-3 text-sm font-bold outline-none">
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Jam Masuk</label>
                    <input type="time" id="shf-masuk" class="w-full p-3 bg-slate-50 border rounded-lg text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Jam Pulang</label>
                    <input type="time" id="shf-keluar" class="w-full p-3 bg-slate-50 border rounded-lg text-sm font-bold outline-none">
                </div>
            </div>
            <input type="number" id="shf-tol" placeholder="Toleransi Terlambat (Menit)" value="15" class="w-full p-3 bg-slate-50 border rounded-lg mb-4 text-sm font-bold outline-none">
            <div class="flex gap-2">
                <button onclick="tutupModal('modal-shift')" class="w-full py-3 bg-slate-200 font-bold rounded-lg">Batal</button>
                <button onclick="simpanShift()" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-lg">Simpan Jadwal</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "URL_WEBAPP_GAS_ANDA"; // Masukkan URL Deploy GAS Anda
        let map, marker;

        function bukaModal(id) {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'modal-outlet') {
                if(!map) {
                    map = L.map('map').setView([-1.269160, 116.825264], 14); // Balikpapan
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    marker = L.marker([-1.269160, 116.825264]).addTo(map);
                    map.on('click', function(e) {
                        marker.setLatLng(e.latlng);
                        document.getElementById('out-lat').value = e.latlng.lat.toFixed(6);
                        document.getElementById('out-lng').value = e.latlng.lng.toFixed(6);
                    });
                }
                setTimeout(() => map.invalidateSize(), 300);
            }
        }

        function tutupModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function simpanOutlet() {
            const nama = document.getElementById('out-nama').value, lat = document.getElementById('out-lat').value;
            const lng = document.getElementById('out-lng').value, rad = document.getElementById('out-rad').value;
            if(!nama || !lat || !rad) return Swal.fire('Gagal', 'Lengkapi Form Outlet', 'warning');

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'tambah_outlet', payload: { nama, lat, lng, radius: rad } }) });
            Swal.fire('Sukses', 'Outlet baru berhasil ditambahkan.', 'success'); tutupModal('modal-outlet');
        }

        async function simpanShift() {
            const outlet = document.getElementById('shf-outlet').value, kode = document.getElementById('shf-nama').value;
            const jamM = document.getElementById('shf-masuk').value, jamK = document.getElementById('shf-keluar').value, tol = document.getElementById('shf-tol').value;
            if(!kode || !jamM || !jamK) return Swal.fire('Gagal', 'Lengkapi Jam Shift', 'warning');

            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'tambah_shift', payload: { outlet, kode, jamMasuk: jamM, jamKeluar: jamK, toleransi: tol } }) });
            Swal.fire('Sukses', `Jadwal shift ${kode} untuk ${outlet} berhasil dibuat!`, 'success'); tutupModal('modal-shift');
        }

        async function loadData() {
            const outlet = document.getElementById('filter-outlet').value;
            Swal.fire({ title: 'Menarik Data...', didOpen: () => Swal.showLoading() });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'tarik_laporan', payload: { outlet: outlet } }) });
            const result = await res.json();
            
            let html = "";
            result.data.forEach(row => {
                const badge = row.status.includes('TERLAMBAT') ? `<span class="bg-rose-100 text-rose-600 px-2 py-1 rounded font-bold">${row.status}</span>` : `<span class="bg-emerald-100 text-emerald-600 px-2 py-1 rounded font-bold">ON TIME</span>`;
                html += `
                    <tr class="hover:bg-slate-50">
                        <td class="p-4">${row.tanggal} <b class="ml-1 text-slate-900">${row.jam}</b></td>
                        <td class="p-4 font-black">${row.nama}</td>
                        <td class="p-4 font-bold text-blue-600">${row.outlet} <span class="text-xs text-slate-400">(${row.shift})</span></td>
                        <td class="p-4 font-black uppercase">${row.tipe}</td>
                        <td class="p-4 text-xs">${row.tipe === 'Masuk' ? badge : '-'}</td>
                    </tr>`;
            });
            document.getElementById('table-body').innerHTML = html || `<tr><td colspan="5" class="p-6 text-center text-rose-500 font-bold">Data kosong.</td></tr>`;
            Swal.close();
        }
    </script>
</body>
</html>
