<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiMoy Smart Kiosk</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #020617; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .camera-container { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; z-index: 0; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; }
        .glass-input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); outline: none; }
        
        /* Animasi Pemindai Dinamis & Laser */
        @keyframes pulse-white { 0%, 100% { border-color: rgba(255,255,255,0.2); box-shadow: 0 0 10px rgba(255,255,255,0.05); } 50% { border-color: rgba(255,255,255,0.7); box-shadow: 0 0 25px rgba(255,255,255,0.3); } }
        @keyframes pulse-yellow { 0%, 100% { border-color: rgba(251,191,36,0.6); box-shadow: 0 0 20px rgba(251,191,36,0.3); transform: scale(1); } 50% { border-color: rgba(251,191,36,1); box-shadow: 0 0 40px rgba(251,191,36,0.6); transform: scale(1.02); } }
        @keyframes scan-laser { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        .box-searching { animation: pulse-white 2.5s infinite ease-in-out; border-style: dashed; }
        .box-liveness { animation: pulse-yellow 1.5s infinite ease-in-out; border-style: solid; border-width: 4px; }
        .box-success { border-color: #10b981; border-style: solid; box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); transform: scale(1.05); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .box-error { border-color: #f43f5e; border-style: solid; box-shadow: 0 0 30px rgba(244, 63, 94, 0.5); }
        
        .laser-line { position: absolute; width: 100%; height: 3px; background: #3b82f6; box-shadow: 0 0 15px #3b82f6; display: none; }
        .box-searching .laser-line { display: block; animation: scan-laser 2s infinite linear; }

        /* Loader Kustom */
        #loader-screen { transition: opacity 0.6s ease; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        select option { background: #0f172a; color: white; padding: 10px; }
        div:where(.swal2-container) .swal2-popup { border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.95) !important; backdrop-filter: blur(20px); color: white; }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center text-white select-none antialiased">

    <!-- LAYAR LOADING KOSMIK -->
    <div id="loader-screen" class="absolute inset-0 z-50 bg-[#020617] flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <h2 class="text-lg font-black tracking-widest animate-pulse text-blue-400">MENYIAPKAN AI...</h2>
        <p class="text-xs text-slate-500 font-bold mt-2">Memuat Sistem Kehadiran</p>
    </div>

    <div class="relative w-full max-w-md mx-auto h-full sm:h-[95vh] sm:rounded-[2.5rem] overflow-hidden shadow-2xl sm:border-[8px] sm:border-slate-800 flex flex-col transition-all">
        
        <!-- 1. KAMERA BACKGROUND -->
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay" class="z-10"></canvas>
            <div class="absolute inset-0 bg-gradient-to-b from-slate-900/90 via-slate-900/20 to-slate-900/95 z-20 pointer-events-none"></div>
        </div>

        <!-- 2. TOP BAR (FULLSCREEN & GPS REFRESH) -->
        <div class="relative z-30 flex justify-between items-start p-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white drop-shadow-lg">AiMoy</h1>
                <div class="flex items-center gap-2 mt-1">
                    <button onclick="forceRefreshGPS()" class="glass-panel p-1.5 rounded-full hover:bg-white/20 transition group" title="Refresh GPS">
                        <svg class="w-3 h-3 text-blue-400 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    <span id="geo-status" class="text-rose-400 text-[10px] tracking-widest font-bold flex items-center gap-1.5">
                        <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span></span>
                        MENCARI GPS...
                    </span>
                </div>
            </div>
            <button onclick="toggleFullScreen()" class="glass-panel p-2.5 rounded-full hover:bg-white/20 transition-all active:scale-95 shadow-lg">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>

        <!-- 3. JAM DIGITAL -->
        <div class="relative z-30 flex flex-col items-center mt-2 pointer-events-none drop-shadow-2xl">
            <div id="real-time-clock" class="text-[5rem] leading-none font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400">00:00</div>
            <div id="real-time-date" class="text-xs font-bold text-blue-400 tracking-widest uppercase mt-2 bg-blue-900/30 px-4 py-1 rounded-full border border-blue-500/30">Memuat Waktu...</div>
        </div>

        <!-- 4. PEMINDAI WAJAH (LASER SCANNER) -->
        <div class="absolute inset-0 z-30 flex flex-col items-center justify-center pointer-events-none mt-14">
            <div id="face-guide-box" class="relative w-[200px] h-[260px] rounded-[50%] box-searching overflow-hidden">
                <div class="laser-line"></div>
            </div>
            <div id="cam-instruction" class="mt-8 glass-panel px-6 py-2.5 rounded-full text-white text-[10px] font-black tracking-widest shadow-xl transition-all duration-300 transform">
                SEJAJARKAN WAJAH
            </div>
        </div>

        <!-- 5. KARTU GREETING (MELAYANG) -->
        <div class="absolute bottom-[230px] left-5 right-5 z-40 flex justify-center pointer-events-none">
            <div id="greeting-card" class="glass-card w-full rounded-2xl p-4 transform translate-y-12 opacity-0 transition-all duration-500 ease-out flex items-center gap-4">
                <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <span class="text-2xl">✨</span>
                </div>
                <div class="flex-1">
                    <p class="text-[9px] font-black text-blue-300 uppercase tracking-widest mb-0.5">Identitas Dikonfirmasi</p>
                    <h2 id="ai-name" class="text-lg font-black text-white truncate leading-tight">Nama...</h2>
                    <p id="ai-status" class="text-[11px] font-bold text-emerald-400 mt-1 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Siap Absen</p>
                </div>
            </div>
        </div>

        <!-- 6. GLASS DOCK BAWAH -->
        <div class="relative z-40 mt-auto w-full px-5 pb-8 pt-10">
            <div id="dist-alert" class="hidden mb-4 glass-card bg-rose-500/20 border-rose-500/50 text-rose-300 p-2.5 rounded-xl text-[11px] font-black text-center shadow-rose-500/20 shadow-lg"></div>

            <div id="panel-absen" class="space-y-3 transform transition-all duration-300">
                <div class="grid grid-cols-2 gap-3">
                    <select id="sel-outlet" onchange="loadShiftDropdown()" class="w-full p-3.5 glass-input rounded-xl text-[11px] uppercase tracking-wider font-bold text-center"><option value="" disabled selected>Pilih Outlet</option></select>
                    <select id="sel-shift" class="w-full p-3.5 glass-input rounded-xl text-[11px] uppercase tracking-wider font-bold text-center"><option value="" disabled selected>Pilih Shift</option></select>
                </div>
                
                <div class="grid grid-cols-2 gap-3 pt-1">
                    <button id="btn-in" onclick="kirimAbsen('Masuk')" disabled class="relative overflow-hidden group bg-blue-600 hover:bg-blue-500 border border-blue-400/50 text-white py-4 rounded-xl font-black shadow-[0_0_20px_rgba(37,99,235,0.4)] disabled:opacity-30 disabled:shadow-none transition-all text-xs tracking-widest">
                        <span class="relative z-10">MASUK</span>
                        <div class="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full group-hover:animate-[shimmer_0.7s_forwards]"></div>
                    </button>
                    <button id="btn-out" onclick="kirimAbsen('Pulang')" disabled class="relative overflow-hidden group bg-slate-800 hover:bg-slate-700 border border-slate-600/50 text-white py-4 rounded-xl font-black shadow-lg disabled:opacity-30 transition-all text-xs tracking-widest">
                        <span class="relative z-10">PULANG</span>
                    </button>
                </div>
                <button id="btn-izin" onclick="ajukanIzin()" disabled class="w-full mt-2 glass-panel bg-amber-500/20 hover:bg-amber-500/40 border-amber-500/50 text-amber-400 py-3 rounded-xl font-bold shadow-lg disabled:opacity-30 transition-all text-[10px] tracking-widest uppercase">Ajukan Izin / Sakit</button>
            </div>

            <div id="panel-reg" class="hidden space-y-3 glass-panel p-5 rounded-2xl transform transition-all duration-300 scale-95 opacity-0">
                <h3 class="font-black text-xs text-blue-400 text-center tracking-widest uppercase mb-3">Registrasi Wajah</h3>
                <input type="text" id="reg-nama" placeholder="Nama Lengkap Staf" class="w-full p-3.5 glass-input rounded-xl text-xs font-bold text-center">
                <div class="grid grid-cols-2 gap-3">
                    <select id="reg-role" class="p-3.5 glass-input rounded-xl text-xs font-bold text-center"><option value="Staff">Staff</option><option value="Senior">Senior</option></select>
                    <select id="reg-outlet" class="p-3.5 glass-input rounded-xl text-xs font-bold text-center"><option value="" disabled selected>Penempatan</option></select>
                </div>
                <button onclick="daftarkan()" class="w-full bg-emerald-500 hover:bg-emerald-400 border border-emerald-400 text-white py-3.5 rounded-xl font-black shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all mt-2 text-xs tracking-widest">KUNCI BIOMETRIK</button>
            </div>

            <div class="flex justify-center gap-8 mt-6 opacity-60 text-[9px] font-black tracking-[0.2em] uppercase">
                <span id="tab-absen" onclick="switchTab('absen')" class="cursor-pointer text-blue-400 transition-colors py-2">Absensi</span>
                <span id="tab-reg" onclick="switchTab('reg')" class="cursor-pointer text-slate-500 hover:text-white transition-colors py-2">Registrasi Baru</span>
            </div>
        </div>
    </div>

    <style>@keyframes shimmer { 100% { transform: translateX(100%); } }</style>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxkOCboooYMfJM2W-1WKVu_dHJbfKHdd28TMuxUVkgSotvkf9TERgTQcnXHXDBixEC6kA/exec"; // <--- JANGAN LUPA UPDATE
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, distance = 0, isLocValid = false, lastRecognizedName = null;
        let isPrompting = false, isLivenessPassed = false;

        // JAM DIGITAL
        setInterval(() => {
            const now = new Date();
            document.getElementById('real-time-clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace(/\./g, ':');
            document.getElementById('real-time-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => {}); } 
            else { if (document.exitFullscreen) document.exitFullscreen(); }
        }

        // GPS MANUAL REFRESH
        function forceRefreshGPS() {
            document.getElementById('geo-status').innerHTML = `<span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span><span class="text-blue-400 text-[10px] tracking-widest font-bold">MENYEGARKAN...</span>`;
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude; userLng = pos.coords.longitude;
                document.getElementById('geo-status').innerHTML = `<span class="relative flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500 shadow-[0_0_10px_#10b981]"></span></span><span class="text-emerald-400 text-[10px] tracking-widest font-bold">AKURAT</span>`;
                cekJarak();
            }, err => { Swal.fire({title:'GPS Gagal', text:'Pastikan izin lokasi HP aktif', background:'#0f172a', color:'#fff', icon:'warning'}); }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        window.addEventListener('load', () => { forceRefreshGPS(); setTimeout(initApp, 500); });

        function hitungJarak(lat1, lon1, lat2Str, lon2Str) {
            const lat2 = parseFloat(lat2Str), lon2 = parseFloat(lon2Str);
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            try {
                await Promise.all([ faceapi.nets.tinyFaceDetector.loadFromUri(URL), faceapi.nets.faceLandmark68Net.loadFromUri(URL), faceapi.nets.faceRecognitionNet.loadFromUri(URL), faceapi.nets.faceExpressionNet.loadFromUri(URL) ]);
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
                const data = await res.json();
                
                dbOutlet = data.dataOutlet; dbShift = data.dataShift;
                let outHtml = '<option value="" disabled selected>Pilih Outlet</option>';
                dbOutlet.forEach(o => { outHtml += `<option value="${o.nama}">${o.nama}</option>`; });
                document.getElementById('sel-outlet').innerHTML = outHtml; document.getElementById('reg-outlet').innerHTML = outHtml;

                if (data.dataKaryawan.length > 0) {
                    const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role, o: k.outlet}), [new Float32Array(k.descriptor)]));
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.40); // Akurasi wajah tetap sangat ketat (0.4)
                }
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: {ideal: 720} } });
                video.srcObject = stream;
                
                // Hilangkan Layar Pemuatan dengan transisi halus
                const loader = document.getElementById('loader-screen');
                loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 600);
            } catch (e) { 
                Swal.fire({title:'Koneksi Terputus', text:'Gagal terhubung ke database operasional', icon:'error', background:'#0f172a', color:'#fff'}); 
                document.getElementById('loader-screen').innerHTML = `<h2 class="text-rose-500 font-black">GAGAL MEMUAT SISTEM</h2>`;
            }
        }

        function loadShiftDropdown() {
            cekJarak();
            const outletName = document.getElementById('sel-outlet').value, shiftSelect = document.getElementById('sel-shift');
            const shiftTersedia = dbShift.filter(s => s.outlet === outletName);
            if(shiftTersedia.length === 0) { shiftSelect.innerHTML = '<option value="" disabled selected>Jadwal Kosong</option>'; } 
            else {
                shiftSelect.innerHTML = '<option value="" disabled selected>Pilih Shift</option>';
                shiftTersedia.forEach(s => { shiftSelect.innerHTML += `<option value="${s.kode}" data-jamm="${s.jamMasuk}" data-jamk="${s.jamKeluar}" data-tol="${s.toleransi}">${s.kode} (${s.jamMasuk})</option>`; });
            }
        }

        function cariShiftOtomatis(outletName) {
            const shifts = dbShift.filter(s => s.outlet === outletName);
            if (shifts.length === 0) return null;
            const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes();
            let bestShift = shifts[0], minDiff = Infinity;
            shifts.forEach(s => {
                const mMasuk = parseInt(s.jamMasuk.split(':')[0]) * 60 + parseInt(s.jamMasuk.split(':')[1]);
                const mKeluar = parseInt(s.jamKeluar.split(':')[0]) * 60 + parseInt(s.jamKeluar.split(':')[1]);
                const closest = Math.min(Math.abs(currentMins - mMasuk), Math.abs(currentMins - mKeluar));
                if(closest < minDiff) { minDiff = closest; bestShift = s; }
            });
            return bestShift;
        }

        function cekJarak() {
            const outName = document.getElementById('sel-outlet').value, alertBox = document.getElementById('dist-alert');
            if(!outName || userLat === 0) return;
            const outlet = dbOutlet.find(o => o.nama === outName);
            if(!outlet) return; distance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            
            if (distance > outlet.radius) { isLocValid = false; alertBox.classList.remove('hidden'); alertBox.innerHTML = `⚠️ Jarak melenceng ${Math.round(distance)}m. Maks ${outlet.radius}m`; updateUI(currentFace !== null, "ERROR"); } 
            else { isLocValid = true; alertBox.classList.add('hidden'); updateUI(currentFace !== null, isLivenessPassed ? "READY" : "LIVENESS_WAIT"); }
        }

        video.addEventListener('loadedmetadata', () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; });

        video.addEventListener('play', () => {
            const size = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, size);
            
            setInterval(async () => {
                if(isPrompting) return;
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })).withFaceLandmarks().withFaceExpressions().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, size); canvas.getContext('2d').clearRect(0, 0, size.width, size.height);

                if (!document.getElementById('panel-absen').classList.contains('hidden') && detections.length > 0 && faceMatcher) {
                    const match = faceMatcher.findBestMatch(resized[0].descriptor);
                    if (match.label !== 'unknown') {
                        const info = JSON.parse(match.label);
                        
                        // LIVENESS DETECTION (Disempurnakan ke 0.35 agar responsif)
                        const expressions = resized[0].expressions;
                        if (expressions.happy > 0.35) { isLivenessPassed = true; }

                        if (!isLivenessPassed) { currentFace = info; updateUI(true, "LIVENESS_WAIT"); return; }
                        
                        if(lastRecognizedName !== info.n) { 
                            lastRecognizedName = info.n; currentFace = info; 
                            const outSel = document.getElementById('sel-outlet'); 
                            if(info.o) { outSel.value = info.o; loadShiftDropdown(); } 
                            
                            const autoShift = cariShiftOtomatis(info.o);
                            if(autoShift) {
                                document.getElementById('sel-shift').value = autoShift.kode; updateUI(true, isLocValid ? "READY" : "ERROR");
                                munculkanPopupAutoAbsen(info, autoShift);
                            } else { updateUI(true, isLocValid ? "READY" : "ERROR"); }
                        } else { currentFace = info; updateUI(true, isLocValid ? "READY" : "ERROR"); }
                    } else { lastRecognizedName = null; isLivenessPassed = false; updateUI(false); }
                } else { lastRecognizedName = null; isLivenessPassed = false; updateUI(false); if (!document.getElementById('panel-reg').classList.contains('hidden')) { faceapi.draw.drawFaceLandmarks(canvas, resized); } }
            }, 600); // Dipercepat loop-nya untuk performa anti-lag
        });

        function updateUI(found, state = "SEARCHING") {
            const box = document.getElementById('face-guide-box'), camInst = document.getElementById('cam-instruction'), card = document.getElementById('greeting-card'), nameEl = document.getElementById('ai-name'), statusEl = document.getElementById('ai-status');
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out'), btnIzin = document.getElementById('btn-izin');
            const outSel = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift').value;
            
            if (found && currentFace) {
                card.classList.remove('translate-y-12', 'opacity-0'); nameEl.innerText = currentFace.n;

                if (state === "LIVENESS_WAIT") {
                    box.className = "relative w-[200px] h-[260px] rounded-[50%] box-liveness";
                    camInst.innerText = "😊 TERSENYUMLAH"; camInst.className = "mt-8 glass-panel border-amber-500 px-6 py-2.5 rounded-full text-amber-400 text-[11px] font-black tracking-widest shadow-[0_0_20px_rgba(251,191,36,0.4)]";
                    statusEl.innerHTML = `<span class="animate-pulse">Menunggu senyum / kedipan...</span>`; statusEl.className = "text-[11px] font-bold text-amber-400 mt-1 flex items-center gap-1";
                    btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true;
                } else if (state === "ERROR") {
                    box.className = "relative w-[200px] h-[260px] rounded-[50%] box-error overflow-hidden";
                    camInst.innerText = "⛔ LOKASI DITOLAK"; camInst.className = "mt-8 bg-rose-500/80 px-6 py-2.5 rounded-full text-white text-[11px] font-black tracking-widest shadow-[0_0_20px_rgba(244,63,94,0.4)]";
                    statusEl.innerText = "Anda berada di luar outlet!"; statusEl.className = "text-[11px] font-bold text-rose-400 mt-1 flex items-center gap-1";
                    btnIn.disabled = true; btnOut.disabled = true; if(outSel) btnIzin.disabled = false;
                } else {
                    box.className = "relative w-[200px] h-[260px] rounded-[50%] box-success overflow-hidden";
                    camInst.innerText = "✅ IDENTITAS DIKUNCI"; camInst.className = "mt-8 bg-emerald-500/80 px-6 py-2.5 rounded-full text-white text-[11px] font-black tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.4)]";
                    statusEl.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_5px_#34d399]"></span> ${shf ? 'Target: '+shf : 'Pilih Shift Anda'}`; statusEl.className = "text-[11px] font-bold text-emerald-400 mt-1 flex items-center gap-1";
                    if(outSel) btnIzin.disabled = false; else btnIzin.disabled = true;
                    if (isLocValid && shf) { btnIn.disabled = false; btnOut.disabled = false; } else { btnIn.disabled = true; btnOut.disabled = true; }
                }
            } else { 
                card.classList.add('translate-y-12', 'opacity-0');
                box.className = "relative w-[200px] h-[260px] rounded-[50%] box-searching overflow-hidden"; box.innerHTML = '<div class="laser-line"></div>';
                camInst.innerText = "SEJAJARKAN WAJAH"; camInst.className = "mt-8 glass-panel px-6 py-2.5 rounded-full text-white text-[10px] font-black tracking-widest shadow-xl";
                currentFace = null; btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true; 
            }
        }

        document.getElementById('sel-shift').addEventListener('change', () => updateUI(currentFace !== null, isLocValid ? "READY" : "ERROR"));

        function munculkanPopupAutoAbsen(faceInfo, shift) {
            isPrompting = true; cekJarak();
            if(!isLocValid) { Swal.fire({ icon: 'warning', title: 'GPS Meleset', text: 'Sistem mengenali Anda, tapi koordinat HP jauh dari toko.', confirmButtonText: 'Tutup', background: '#0f172a', color: '#fff' }).then(() => { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; }); return; }
            Swal.fire({
                title: `<span class="text-blue-400 text-2xl font-black">Halo, ${faceInfo.n}!</span>`,
                html: `<div class="text-slate-300 text-sm">Penempatan: <b class="text-white">${faceInfo.o}</b><br><br>Target Shift Anda:<br><div class="glass-input rounded-xl py-3 mt-2 font-black text-2xl text-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.2)] border-emerald-500/30">${shift.kode} <span class="text-[10px] uppercase font-bold text-emerald-200/50 block tracking-widest">${shift.jamMasuk} - ${shift.jamKeluar}</span></div></div>`,
                showDenyButton: true, showCancelButton: true, background: '#0f172a', color: '#fff',
                confirmButtonText: 'MASUK KERJA', confirmButtonColor: '#2563eb', denyButtonText: 'PULANG KERJA', denyButtonColor: '#1e293b', cancelButtonText: 'Manual', allowOutsideClick: false,
                customClass: { popup: 'rounded-[2rem] border border-slate-700/50 shadow-2xl', confirmButton: 'rounded-xl font-black w-full mb-2 tracking-widest text-xs', denyButton: 'rounded-xl font-black border border-slate-600 w-full mb-2 tracking-widest text-xs', cancelButton: 'rounded-xl w-full tracking-widest text-xs', actions: 'flex-col w-full px-4' }
            }).then((result) => {
                if (result.isConfirmed) { kirimAbsen('Masuk'); } else if (result.isDenied) { kirimAbsen('Pulang'); } else { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; } 
            });
        }

        function ambilFotoKamera() { const tempCanvas = document.createElement('canvas'); const scale = 480 / video.videoWidth; tempCanvas.width = 480; tempCanvas.height = video.videoHeight * scale; const ctx = tempCanvas.getContext('2d'); ctx.translate(tempCanvas.width, 0); ctx.scale(-1, 1); ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height); return tempCanvas.toDataURL('image/jpeg', 0.6); }

        async function kirimAbsen(tipe) {
            isPrompting = true; const out = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift'); const shfM = shf.options[shf.selectedIndex].getAttribute('data-jamm'), shfK = shf.options[shf.selectedIndex].getAttribute('data-jamk'), shfTol = shf.options[shf.selectedIndex].getAttribute('data-tol'); const fotoData = ambilFotoKamera();

            Swal.fire({ title: 'Sinkronisasi...', html: '<span class="text-xs text-blue-300">Menyimpan log ke pangkalan data</span>', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading(), customClass:{popup:'rounded-[2rem]'} });
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, namaShift: shf.value, shiftTarget: shfM, shiftKeluar: shfK, toleransi: shfTol, tipe: tipe, jarak: distance, foto: fotoData } }) });
                const result = await res.json();
                
                if (result.status === 'success') {
                    const textWA = `*NOTIFIKASI ABSENSI AIMOY*%0A%0A👤 *Nama:* ${currentFace.n}%0A💼 *Shift:* ${shf.value} (${shfM}-${shfK})%0A🏢 *Lokasi:* ${out}%0A📍 *Tipe:* ${tipe.toUpperCase()}%0A⏰ *Waktu:* ${result.jam}%0A✅ *Status:* ${result.statusWaktu}%0A📸 *Bukti Foto:* ${result.linkFoto}`;
                    const waLink = `https://api.whatsapp.com/send?text=${textWA}`;

                    Swal.fire({ icon: 'success', title: 'Berhasil!', background: '#0f172a', color: '#fff', html: `<div class="text-sm text-slate-300">Terima kasih, <b>${currentFace.n}</b>.<br><br>Status Log: <b class="text-emerald-400 px-3 py-1 bg-emerald-900/30 rounded-lg border border-emerald-500/30">${result.statusWaktu}</b></div><br><a href="${waLink}" target="_blank" class="mt-4 bg-emerald-500 text-white px-4 py-3.5 rounded-xl font-black block text-center uppercase tracking-widest text-[10px] shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all">💬 Kirim ke Grup WA</a>`, showConfirmButton: false, timer: 15000, customClass: { popup: 'rounded-[2rem] border border-slate-700/50' } }).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; document.getElementById('sel-shift').value = ""; updateUI(false); });
                } else { Swal.fire({title: 'Ditolak', text: result.message, icon: 'error', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
            } catch (e) { Swal.fire({title: 'Offline', text: 'Gagal menghubungi server.', icon: 'error', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
        }

        async function ajukanIzin() {
            isPrompting = true; const out = document.getElementById('sel-outlet').value;
            const { value: alasan } = await Swal.fire({ title: 'Form Izin / Sakit', input: 'text', inputLabel: 'Tuliskan alasan yang jelas', showCancelButton: true, background: '#0f172a', color: '#fff', inputValidator: (value) => { if (!value) return 'Alasan wajib diisi!' }, customClass: { popup: 'rounded-[2rem] border border-slate-700/50', input: 'glass-input text-white rounded-xl', confirmButton: 'bg-amber-500 rounded-xl font-black text-xs tracking-widest', cancelButton: 'rounded-xl text-xs tracking-widest' } });
            if (alasan) {
                const fotoData = ambilFotoKamera();
                Swal.fire({ title: 'Merekam Izin...', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading(), customClass:{popup:'rounded-[2rem]'} });
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, tipe: 'Izin', keterangan: alasan, foto: fotoData } }) });
                    const result = await res.json();
                    if (result.status === 'success') Swal.fire({title: 'Validasi Sukses', html: `Izin <b>${currentFace.n}</b> telah diserahkan ke HRD.`, icon: 'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-[2rem] border border-slate-700/50' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; });
                } catch (e) { Swal.fire({title:'Gagal', text:'Server Sibuk', icon:'error', background:'#0f172a', color:'#fff', customClass:{popup:'rounded-3xl'}}).then(() => { isPrompting = false; }); }
            } else { isPrompting = false; }
        }

        async function daftarkan() {
            isPrompting = true; const nama = document.getElementById('reg-nama').value, role = document.getElementById('reg-role').value, outlet = document.getElementById('reg-outlet').value;
            if(!nama || !outlet) { isPrompting = false; return Swal.fire({title:'Peringatan', text:'Data tidak lengkap', icon:'warning', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}); }

            Swal.fire({ title: 'Analisis Biometrik', html: '<span class="text-xs text-blue-300">Jangan bergerak...</span>', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading(), customClass:{popup:'rounded-[2rem]'} });
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(!detection) { isPrompting = false; return Swal.fire({title:'Gagal', text:'Wajah kabur. Hindari bayangan.', icon:'error', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}); }

            if (faceMatcher) {
                const match = faceMatcher.findBestMatch(detection.descriptor);
                if (match.label !== 'unknown') {
                    const existData = JSON.parse(match.label); isPrompting = false; return Swal.fire({ icon: 'error', title: 'Akses Ditolak', html: `Wajah diidentifikasi sebagai:<br><br><b class="text-2xl text-rose-400 bg-rose-500/10 px-4 py-2 rounded-xl border border-rose-500/30 inline-block">${existData.n}</b>`, background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-[2rem] border border-slate-700/50' } });
                }
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'enroll', payload: { nama, role, outlet, descriptor: Array.from(detection.descriptor) } }) });
                const data = await res.json();
                if(data.status === 'success') Swal.fire({title:'Biometrik Terkunci!', html:`Identitas <b>${nama}</b> aktif.`, icon:'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-[2rem] border border-slate-700/50' }}).then(() => location.reload());
            } catch(e) { Swal.fire('Error', 'Gagal komunikasi server', 'error').then(() => { isPrompting = false; }); }
        }

        function switchTab(t) { 
            const pAbsen = document.getElementById('panel-absen'), pReg = document.getElementById('panel-reg');
            if (t === 'reg') {
                pAbsen.classList.add('scale-95', 'opacity-0'); setTimeout(() => { pAbsen.classList.add('hidden'); pReg.classList.remove('hidden'); setTimeout(() => pReg.classList.remove('scale-95', 'opacity-0'), 50); }, 300);
            } else {
                pReg.classList.add('scale-95', 'opacity-0'); setTimeout(() => { pReg.classList.add('hidden'); pAbsen.classList.remove('hidden'); setTimeout(() => pAbsen.classList.remove('scale-95', 'opacity-0'), 50); }, 300);
            }
            document.getElementById('tab-absen').classList.toggle('text-blue-400', t === 'absen'); document.getElementById('tab-absen').classList.toggle('text-slate-500', t === 'reg'); 
            document.getElementById('tab-reg').classList.toggle('text-blue-400', t === 'reg'); document.getElementById('tab-reg').classList.toggle('text-slate-500', t === 'absen'); 
        }
    </script>
</body>
</html>
