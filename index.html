<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiMoy Absen</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="./logoaimoy.png">
    <link rel="apple-touch-icon" href="./logoaimoy.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #0f172a; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .camera-container { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; z-index: 0; overflow: hidden; }
        video { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    object-fit: cover; 
    transform: scaleX(-1) translateZ(0); /* Hardware Acceleration */
    will-change: transform; 
}

        .matte-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .matte-input { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.3s; }
        .matte-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); outline: none; }
        
        #tracking-box {
            position: absolute; border-radius: 1rem; z-index: 30; pointer-events: none;
            transition: all 0.1s ease-out; opacity: 0;
            box-shadow: 0 0 0 4000px rgba(15, 23, 42, 0.65);
        }
        
        .corner { position: absolute; width: 25px; height: 25px; border-color: #fff; border-style: solid; transition: border-color 0.3s; }
        .corner-tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 1rem; }
        .corner-tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 1rem; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 1rem; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 1rem; }

        @keyframes scan-laser { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .laser-line { position: absolute; width: 100%; height: 2px; background: #3b82f6; box-shadow: 0 0 10px 2px #3b82f6; animation: scan-laser 2s infinite linear; }

        .matrix-grid { 
            position: absolute; inset: 0; border-radius: 1.5rem; opacity: 0; transition: opacity 0.4s;
            background-size: 15px 15px;
            background-image: linear-gradient(to right, rgba(16, 185, 129, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(16, 185, 129, 0.1) 1px, transparent 1px);
        }
        .shape-rect .matrix-grid { opacity: 1; }

        .track-search .corner { border-color: #3b82f6; } 
        .track-liveness .corner { border-color: #f59e0b; } 
        .track-success .corner { border-color: #10b981; } 
        .track-error .corner { border-color: #f43f5e; }

        .shape-oval { width: 210px; height: 290px; border-radius: 11rem; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .shape-rect { width: 230px; height: 230px; border-radius: 1.5rem; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        select option { background: #0f172a; color: white; padding: 10px; }
        div:where(.swal2-container) .swal2-popup { border-radius: 24px; border: 1px solid #334155; background: #0f172a !important; color: white; }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center text-white select-none antialiased">

    <div id="flash-overlay" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50 transition-opacity duration-75"></div>

    <div id="loader-screen" class="absolute inset-0 z-50 bg-[#0f172a] flex flex-col items-center justify-center">
        <img src="./logoaimoy.png" alt="Logo" class="w-16 h-16 mb-4 animate-pulse rounded-2xl shadow-lg border border-slate-700">
        <div class="spinner mb-2"></div>
        <h2 class="text-sm font-black tracking-widest text-blue-400 uppercase">Menyiapkan Mesin...</h2>
        <p id="loader-text" class="text-[11px] text-slate-400 font-bold mt-1">Membaca memori lokal</p>
    </div>

    <div class="relative w-full max-w-md mx-auto h-full sm:h-[95vh] sm:rounded-[2rem] overflow-hidden shadow-2xl bg-[#0f172a] flex flex-col">
        
        <div class="camera-container" id="cam-container">
            <video id="video" autoplay muted playsinline></video>
            <div id="tracking-box" class="track-search">
                <div class="matrix-grid"></div> 
                <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div><div class="corner corner-br"></div>
                <div class="laser-line" id="laser"></div>
            </div>
        </div>

        <div class="relative z-40 flex justify-between items-start p-5 bg-gradient-to-b from-slate-900/90 to-transparent pointer-events-none">
            <div class="flex items-center gap-3 pointer-events-auto">
                <img src="./logoaimoy.png" alt="Logo mini" class="w-9 h-9 rounded-xl border border-slate-700 shadow-md">
                <div>
                    <h1 class="text-base font-black tracking-tighter text-white">AiMoy Absen</h1>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <button onclick="forceRefreshGPS()" class="bg-slate-800 p-1 rounded-full hover:bg-slate-700 transition">
                            <svg class="w-2.5 h-2.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                        <span id="geo-status" class="text-rose-400 text-[9px] tracking-widest font-bold uppercase">Mencari Satelit...</span>
                    </div>
                </div>
            </div>
            <div class="flex gap-2 pointer-events-auto">
                <button onclick="syncDataManual()" class="bg-slate-800 p-2 rounded-full hover:bg-slate-700 transition shadow-md" title="Sinkronisasi Karyawan Baru">
                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                </button>
                <button onclick="toggleFullScreen()" class="bg-slate-800 p-2 rounded-full hover:bg-slate-700 transition shadow-md">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
        </div>

        <button id="floating-install-btn" onclick="openInstallPrompt()" class="hidden absolute top-[80px] right-4 z-40 bg-blue-600/90 backdrop-blur-md border border-blue-400/50 text-white px-3 py-1.5 rounded-full text-[10px] font-black shadow-[0_0_15px_rgba(37,99,235,0.5)] flex items-center gap-1.5 transition-all animate-bounce">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            INSTALL
        </button>

        <div class="relative z-40 flex flex-col items-center mt-2 pointer-events-none drop-shadow-md">
            <div id="real-time-clock" class="text-5xl font-black tracking-tighter text-white">00:00</div>
            <div id="real-time-date" class="text-[9px] font-bold text-slate-300 tracking-widest uppercase mt-1 bg-slate-900/60 px-3 py-1 rounded-full border border-slate-700">Waktu...</div>
        </div>

        <div class="absolute inset-0 z-30 flex flex-col items-center justify-center pointer-events-none">
            <div id="cam-instruction" class="mt-[280px] bg-slate-800/80 px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest transition-all">
                Pindai Wajah...
            </div>
        </div>

        <div class="relative z-40 mt-auto w-full matte-panel pt-5 px-5 pb-6 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
            
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                    <span id="avatar-icon" class="text-lg">👤</span>
                </div>
                <div class="flex-1 overflow-hidden">
                    <h2 id="ai-name" class="text-sm font-black text-white truncate">Wajah Belum Dikenali</h2>
                    <p id="ai-status" class="text-[10px] font-bold text-slate-400 truncate">Menunggu pemindaian biometrik</p>
                </div>
            </div>

            <div id="dist-alert" class="hidden mb-3 bg-rose-500/10 border border-rose-500/30 text-rose-400 p-2 rounded-lg text-[10px] font-bold text-center"></div>

            <div id="panel-absen" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <select id="sel-outlet" onchange="loadShiftDropdown()" class="w-full p-3 matte-input rounded-lg text-xs font-bold text-center appearance-none"><option value="" disabled selected>Pilih Outlet</option></select>
                    <select id="sel-shift" class="w-full p-3 matte-input rounded-lg text-xs font-bold text-center appearance-none"><option value="" disabled selected>Pilih Shift</option></select>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-in" onclick="kirimAbsen('Masuk')" disabled class="bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-lg font-black disabled:opacity-30 disabled:bg-slate-800 transition-all text-xs tracking-widest">MASUK</button>
                    <button id="btn-out" onclick="kirimAbsen('Pulang')" disabled class="bg-slate-700 hover:bg-slate-600 text-white py-3.5 rounded-lg font-black disabled:opacity-30 disabled:bg-slate-800 transition-all text-xs tracking-widest">PULANG</button>
                </div>
                <button id="btn-izin" onclick="ajukanIzin()" disabled class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 py-3 rounded-lg font-bold disabled:opacity-30 transition-all text-[10px] tracking-widest uppercase">Ajukan Izin / Sakit</button>
            </div>

            <div id="panel-reg" class="hidden space-y-3">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap Staf Baru" class="w-full p-3 matte-input rounded-lg text-xs font-bold text-center">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3 matte-input rounded-lg text-xs font-bold text-center"><option value="Staff">Staff</option><option value="Senior">Senior</option></select>
                    <select id="reg-outlet" class="p-3 matte-input rounded-lg text-xs font-bold text-center"><option value="" disabled selected>Penempatan</option></select>
                </div>
                <button onclick="daftarkan()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-lg font-black transition-all text-xs tracking-widest">KUNCI BIOMETRIK</button>
            </div>

            <div class="flex justify-center gap-8 mt-4 pt-4 border-t border-slate-800 text-[9px] font-black tracking-widest uppercase">
                <span id="tab-absen" onclick="switchTab('absen')" class="cursor-pointer text-blue-400">Absensi</span>
                <span id="tab-reg" onclick="switchTab('reg')" class="cursor-pointer text-slate-500 hover:text-white">Registrasi Baru</span>
            </div>
        </div>
    </div>

    <div id="install-prompt" class="fixed bottom-0 left-0 right-0 z-50 p-4 transform translate-y-full transition-transform duration-500">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl p-5 shadow-2xl flex flex-col items-center text-center">
            <img src="./logoaimoy.png" alt="Logo Kiosk" class="w-12 h-12 rounded-xl mb-3 border border-slate-600 shadow-md">
            <h3 class="text-white font-black text-base">Install AiMoy Kiosk</h3>
            <p id="install-instruction" class="text-slate-300 text-[10px] font-medium mt-1 mb-4 leading-relaxed">
                Tambahkan ke Layar Utama HP Anda untuk kecepatan & stabilitas maksimal harian.
            </p>
            <div class="flex gap-2 w-full">
                <button onclick="closeInstallPrompt()" class="flex-1 py-2.5 rounded-lg bg-slate-700 text-white font-bold text-xs">Nanti Saja</button>
                <button id="btn-install" class="flex-1 py-2.5 rounded-lg bg-blue-600 text-white font-black text-xs">INSTALL SEKARANG</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxkOCboooYMfJM2W-1WKVu_dHJbfKHdd28TMuxUVkgSotvkf9TERgTQcnXHXDBixEC6kA/exec"; // <--- JANGAN LUPA UPDATE URL GAS
        
        // --- 1. PWA INSTALL LOGIC ---
        let deferredPrompt; 
        const installPopup = document.getElementById('install-prompt');
        const btnInstall = document.getElementById('btn-install');
        const floatInstallBtn = document.getElementById('floating-install-btn');
        const instructionText = document.getElementById('install-instruction');
        
        const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone) || window.matchMedia('(display-mode: standalone)').matches;

        if (!isInStandaloneMode()) {
            if (isIos()) { 
                instructionText.innerHTML = `Tekan tombol <b>Share (Bagikan)</b> di browser Safari bawah, lalu pilih<br><b>"Tambahkan ke Layar Utama" ⊞</b>.`; 
                btnInstall.style.display = 'none'; 
                setTimeout(() => installPopup.classList.remove('translate-y-full'), 3000); 
            } else { 
                window.addEventListener('beforeinstallprompt', (e) => { 
                    e.preventDefault(); deferredPrompt = e; 
                    setTimeout(() => installPopup.classList.remove('translate-y-full'), 3000); 
                }); 
                btnInstall.addEventListener('click', async () => { 
                    if (deferredPrompt) { 
                        deferredPrompt.prompt(); 
                        const { outcome } = await deferredPrompt.userChoice; 
                        if (outcome === 'accepted') {
                            installPopup.classList.add('translate-y-full'); 
                            floatInstallBtn.classList.add('hidden');
                        }
                        deferredPrompt = null; 
                    } 
                }); 
            }
        }
        
        function closeInstallPrompt() { 
            installPopup.classList.add('translate-y-full'); 
            floatInstallBtn.classList.remove('hidden');
        }
        
        function openInstallPrompt() {
            installPopup.classList.remove('translate-y-full');
            floatInstallBtn.classList.add('hidden');
        }

        // --- 2. LOGIKA KIOSK & AI ---
        const video = document.getElementById('video'), trackingBox = document.getElementById('tracking-box');
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, distance = 0, isLocValid = false, lastRecognizedName = null;
        let isPrompting = false, isLivenessPassed = false;

        setInterval(() => {
            const now = new Date(); document.getElementById('real-time-clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace(/\./g, ':'); document.getElementById('real-time-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);

        function toggleFullScreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => {}); } else { if (document.exitFullscreen) document.exitFullscreen(); } }

        function forceRefreshGPS() {
            document.getElementById('geo-status').innerHTML = `<span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span><span class="text-blue-400">KOORDINASI...</span>`;
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude; userLng = pos.coords.longitude; document.getElementById('geo-status').innerHTML = `<span class="relative flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500 shadow-[0_0_10px_#10b981]"></span></span><span class="text-emerald-400">TERKUNCI</span>`; cekJarak();
            }, err => { Swal.fire({title:'GPS Gagal', text:'Pastikan izin lokasi HP aktif', background:'#0f172a', color:'#fff', icon:'warning'}); }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        window.addEventListener('load', () => { 
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
            forceRefreshGPS(); setTimeout(initApp, 500); 
        });

        async function fetchMasterData(force = false) {
            const cached = localStorage.getItem('aimoy_master_data'); const cacheTime = localStorage.getItem('aimoy_cache_time'); const now = new Date().getTime();
            if (!force && cached && cacheTime && (now - cacheTime < 43200000)) { document.getElementById('loader-text').innerText = "Memuat data offline..."; return JSON.parse(cached); }
            document.getElementById('loader-text').innerText = "Sinkronisasi server...";
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) }); const data = await res.json();
            localStorage.setItem('aimoy_master_data', JSON.stringify(data)); localStorage.setItem('aimoy_cache_time', now.toString()); return data;
        }

        async function syncDataManual() {
            Swal.fire({ title: 'Menarik Data Baru...', allowOutsideClick: false, background: '#0f172a', didOpen: () => Swal.showLoading() });
            try { const data = await fetchMasterData(true); setupDropdownsAndMatcher(data); Swal.fire({icon: 'success', title: 'Sinkronisasi Selesai', background: '#0f172a', timer: 1500, showConfirmButton: false}); } catch(e) { Swal.fire({icon: 'error', title: 'Gagal', background: '#0f172a'}); }
        }

        function setupDropdownsAndMatcher(data) {
            dbOutlet = data.dataOutlet; dbShift = data.dataShift;
            let outHtml = '<option value="" disabled selected>Pilih Outlet</option>'; dbOutlet.forEach(o => { outHtml += `<option value="${o.nama}">${o.nama}</option>`; });
            document.getElementById('sel-outlet').innerHTML = outHtml; document.getElementById('reg-outlet').innerHTML = outHtml;
            if (data.dataKaryawan.length > 0) { const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role, o: k.outlet}), [new Float32Array(k.descriptor)])); faceMatcher = new faceapi.FaceMatcher(labeled, 0.40); }
        }

        function hitungJarak(lat1, lon1, lat2Str, lon2Str) { const lat2 = parseFloat(lat2Str), lon2 = parseFloat(lon2Str); const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180; const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2); return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }

       async function initApp() {
            const URL = './models'; 
            try {
                document.getElementById('loader-text').innerText = "Mengaktifkan AI...";
                await Promise.all([ faceapi.nets.tinyFaceDetector.loadFromUri(URL), faceapi.nets.faceLandmark68Net.loadFromUri(URL), faceapi.nets.faceRecognitionNet.loadFromUri(URL) ]);
                const data = await fetchMasterData(); setupDropdownsAndMatcher(data);
                
                // --- PERUBAHAN: Resolusi ideal diturunkan ke 480 agar ringan ---
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: {ideal: 480} } }); 
                video.srcObject = stream;
                
                const loader = document.getElementById('loader-screen'); loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 400);
                faceapi.nets.faceExpressionNet.loadFromUri(URL); 
            } catch (e) { document.getElementById('loader-screen').innerHTML = `<div class="p-6 text-center"><h2 class="text-rose-500 font-black mb-2">SISTEM GAGAL</h2><p class="text-slate-400 text-xs">Pastikan folder <b>models</b> sudah ditaruh di dalam direktori repositori Anda.</p></div>`; }
        }

        function loadShiftDropdown() {
            cekJarak(); const outletName = document.getElementById('sel-outlet').value, shiftSelect = document.getElementById('sel-shift'); const shiftTersedia = dbShift.filter(s => s.outlet === outletName);
            if(shiftTersedia.length === 0) { shiftSelect.innerHTML = '<option value="" disabled selected>Jadwal Kosong</option>'; } 
            else { shiftSelect.innerHTML = '<option value="" disabled selected>Pilih Shift</option>'; shiftTersedia.forEach(s => { shiftSelect.innerHTML += `<option value="${s.kode}" data-jamm="${s.jamMasuk}" data-jamk="${s.jamKeluar}" data-tol="${s.toleransi}">${s.kode} (${s.jamMasuk})</option>`; }); }
        }

        function cariShiftOtomatis(outletName) {
            const shifts = dbShift.filter(s => s.outlet === outletName); 
            if (shifts.length === 0) return null;
            const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes(); 
            let bestShift = shifts[0], minDiff = Infinity;
            
            shifts.forEach(s => { 
                const mMasuk = parseInt(s.jamMasuk.split(':')[0]) * 60 + parseInt(s.jamMasuk.split(':')[1]); 
                const mKeluar = parseInt(s.jamKeluar.split(':')[0]) * 60 + parseInt(s.jamKeluar.split(':')[1]); 
                
                // Mendukung jika shift malam (misal 22:00 - 06:00 lintas hari)
                let adjustedKeluar = mKeluar < mMasuk ? mKeluar + (24 * 60) : mKeluar;
                let adjustedCurrent = currentMins;
                if (mKeluar < mMasuk && currentMins < mMasuk && currentMins <= mKeluar + 60) {
                    adjustedCurrent += (24 * 60);
                }

                // Cari yang paling dekat dengan Jam Masuk ATAU Jam Keluar shift tersebut
                const diffMasuk = Math.abs(adjustedCurrent - mMasuk);
                const diffKeluar = Math.abs(adjustedCurrent - adjustedKeluar);
                const closestToThisShift = Math.min(diffMasuk, diffKeluar);

                if(closestToThisShift < minDiff) { 
                    minDiff = closestToThisShift; 
                    bestShift = s; 
                } 
            }); 
            return bestShift;
        }

        function cekJarak() {
            const outName = document.getElementById('sel-outlet').value, alertBox = document.getElementById('dist-alert');
            if(!outName || userLat === 0) return; const outlet = dbOutlet.find(o => o.nama === outName); if(!outlet) return; distance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            if (distance > outlet.radius) { isLocValid = false; alertBox.classList.remove('hidden'); alertBox.innerHTML = `⚠️ Diluar Radius Toko (${Math.round(distance)}m)`; updateUI(currentFace !== null, "ERROR"); } 
            else { isLocValid = true; alertBox.classList.add('hidden'); updateUI(currentFace !== null, isLivenessPassed ? "READY" : "LIVENESS_WAIT"); }
        }

        video.addEventListener('play', async () => {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            // faceapi.matchDimensions(video, displaySize); // (Opsional, praktik baik face-api)

            async function deteksiWajahLoop() {
                if(!isPrompting && video.readyState === 4) {
                    try {
                        // --- PERUBAHAN: detectSingleFace & inputSize 160 (Fokus 1 wajah & Super Ringan) ---
                        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160 })).withFaceLandmarks().withFaceExpressions().withFaceDescriptor();

                        if (!document.getElementById('panel-absen').classList.contains('hidden') && detection && faceMatcher) {
                            // Karena detectSingleFace, result bukan array (tidak perlu pakai index [0])
                            const resized = faceapi.resizeResults(detection, { width: video.videoWidth, height: video.videoHeight });
                            const boxData = resized.detection.box;

                            const scaleX = displaySize.width / video.videoWidth; 
                            const scaleY = displaySize.height / video.videoHeight;
                            const mirroedX = video.videoWidth - boxData.x - boxData.width;

                            trackingBox.style.opacity = '1';
                            trackingBox.style.width = (boxData.width * scaleX * 1.25) + 'px';
                            trackingBox.style.height = (boxData.height * scaleY * 1.35) + 'px';
                            trackingBox.style.left = (mirroedX * scaleX - (boxData.width * scaleX * 0.12)) + 'px';
                            trackingBox.style.top = (boxData.y * scaleY - (boxData.height * scaleY * 0.18)) + 'px';

                            const match = faceMatcher.findBestMatch(resized.descriptor);
                            if (match.label !== 'unknown') {
                                const info = JSON.parse(match.label); 
                                const expressions = resized.expressions;
                                if (expressions && expressions.happy > 0.35) { isLivenessPassed = true; }
                                
                                if (!isLivenessPassed) { 
                                    currentFace = info; updateUI(true, "LIVENESS_WAIT"); 
                                } else {
                                    if(lastRecognizedName !== info.n) { 
                                        lastRecognizedName = info.n; currentFace = info; 
                                        const outSel = document.getElementById('sel-outlet'); 
                                        if(info.o) { outSel.value = info.o; loadShiftDropdown(); } 
                                        const autoShift = cariShiftOtomatis(info.o);
                                        
                                        if(autoShift && isLocValid) { 
                                            document.getElementById('sel-shift').value = autoShift.kode; 
                                            updateUI(true, "READY"); 
                                            munculkanPopupAutoAbsen(info, autoShift); 
                                        } else { 
                                            updateUI(true, isLocValid ? "READY" : "ERROR"); 
                                        }
                                    } else { 
                                        currentFace = info; updateUI(true, isLocValid ? "READY" : "ERROR"); 
                                    }
                                }
                            } else { 
                                lastRecognizedName = null; isLivenessPassed = false; updateUI(false); 
                            }
                        } else { 
                            if(document.getElementById('panel-reg').classList.contains('hidden')) { trackingBox.style.opacity = '0'; } 
                            lastRecognizedName = null; isLivenessPassed = false; updateUI(false); 
                        }
                    } catch (err) {
                        console.warn("Deteksi tertunda...", err);
                    }
                }
                
                // --- PERUBAHAN: Loop terkontrol, jeda 400ms setelah frame sebelumnya benar-benar selesai ---
                setTimeout(() => requestAnimationFrame(deteksiWajahLoop), 400);
            }

            // Mulai looping
            deteksiWajahLoop();
        });
        function triggerFlash() {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            setTimeout(() => { flash.style.opacity = '0'; }, 100);
        }

        function updateUI(found, state = "SEARCHING") {
            const camInst = document.getElementById('cam-instruction'), nameEl = document.getElementById('ai-name'), statusEl = document.getElementById('ai-status');
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out'), btnIzin = document.getElementById('btn-izin');
            const outSel = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift').value;
            const icon = document.getElementById('avatar-icon');
            
            const isReg = !document.getElementById('panel-reg').classList.contains('hidden');
            
            if (found && currentFace && !isReg) {
                nameEl.innerText = currentFace.n;
                if (state === "LIVENESS_WAIT") {
                    trackingBox.className = "track-liveness"; document.getElementById('laser').style.display = "none";
                    camInst.innerText = "SMILE / TERSENYUM"; camInst.className = "absolute top-10 bg-amber-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                    statusEl.innerText = "Menunggu otentikasi liveness..."; statusEl.className = "text-[10px] font-bold text-amber-400"; icon.innerText = "😊";
                    btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true;
                } else if (state === "ERROR") {
                    trackingBox.className = "track-error"; document.getElementById('laser').style.display = "none";
                    camInst.innerText = "DI LUAR RADIUS"; camInst.className = "absolute top-10 bg-rose-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                    statusEl.innerText = "Gagal validasi kordinat GPS!"; statusEl.className = "text-[10px] font-bold text-rose-400"; icon.innerText = "📍";
                    btnIn.disabled = true; btnOut.disabled = true; if(outSel) btnIzin.disabled = false; // Tombol Izin diizinkan jika sedang sakit di rumah
                } else {
                    trackingBox.className = "track-success"; document.getElementById('laser').style.display = "none";
                    camInst.innerText = "BERHASIL DIKUNCI"; camInst.className = "absolute top-10 bg-emerald-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                    statusEl.innerText = shf ? `Shift Cocok: ${shf}` : "Silakan Konfirmasi Shift"; statusEl.className = "text-[10px] font-bold text-emerald-400"; icon.innerText = "✅";
                    if(outSel) btnIzin.disabled = false; else btnIzin.disabled = true;
                    if (isLocValid && shf) { btnIn.disabled = false; btnOut.disabled = false; } else { btnIn.disabled = true; btnOut.disabled = true; }
                }
            } else { 
                if(!isReg) {
                    trackingBox.className = "track-search"; document.getElementById('laser').style.display = "block";
                    camInst.innerText = "Sejajarkan Wajah Anda"; camInst.className = "absolute top-10 bg-slate-800/80 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                    nameEl.innerText = "Wajah Belum Dikenali"; statusEl.innerText = "Menunggu biometrik"; statusEl.className = "text-[10px] font-bold text-slate-400"; icon.innerText = "👤";
                    currentFace = null; btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true;
                }
            }
        }

        document.getElementById('sel-shift').addEventListener('change', () => updateUI(currentFace !== null, isLocValid ? "READY" : "ERROR"));

        function munculkanPopupAutoAbsen(faceInfo, shift) {
            isPrompting = true;
            Swal.fire({
                title: `<span class="text-blue-400 text-xl font-black">Halo, ${faceInfo.n}!</span>`,
                html: `<div class="text-slate-300 text-xs">Penempatan: <b class="text-white">${faceInfo.o}</b><br><br>Target Jadwal:<br><div class="bg-[#1e293b] rounded-lg py-2 mt-2 font-black text-lg text-emerald-400 border border-slate-700">${shift.kode} <span class="text-[9px] uppercase font-bold text-slate-400 block">${shift.jamMasuk} - ${shift.jamKeluar}</span></div></div>`,
                showDenyButton: true, showCancelButton: true, background: '#0f172a', color: '#fff',
                confirmButtonText: 'KONFIRMASI MASUK', confirmButtonColor: '#2563eb', denyButtonText: 'KONFIRMASI PULANG', denyButtonColor: '#334155', cancelButtonText: 'Absen Manual / Izin', allowOutsideClick: false,
                customClass: { popup: 'rounded-3xl border border-slate-700', confirmButton: 'rounded-lg font-black w-full mb-2 text-xs', denyButton: 'rounded-lg font-black w-full mb-2 text-xs', cancelButton: 'rounded-lg w-full text-xs bg-slate-800', actions: 'flex-col w-full px-4' }
            }).then((result) => { 
                if (result.isConfirmed) { kirimAbsen('Masuk'); } 
                else if (result.isDenied) { kirimAbsen('Pulang'); } 
                else { 
                    isPrompting = false; 
                    // PERBAIKAN: Kami sengaja tidak mereset lastRecognizedName 
                    // agar pengguna mendarat di layar dengan tombol Izin yang aktif.
                } 
            });
        }

        // AMBIL FOTO + PROSES REKAP PAYLOAD KOMPRESI EKSTREM
        function ambilFotoKamera() { 
            const tempCanvas = document.createElement('canvas'); const MAX_WIDTH = 320; const scale = MAX_WIDTH / video.videoWidth; 
            tempCanvas.width = MAX_WIDTH; tempCanvas.height = video.videoHeight * scale; 
            const ctx = tempCanvas.getContext('2d'); ctx.translate(tempCanvas.width, 0); ctx.scale(-1, 1); ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height); 
            return tempCanvas.toDataURL('image/jpeg', 0.4); 
        }

        async function kirimAbsen(tipe) {
            isPrompting = true; triggerFlash();
            const out = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift'); const shfM = shf.options[shf.selectedIndex].getAttribute('data-jamm'), shfK = shf.options[shf.selectedIndex].getAttribute('data-jamk'), shfTol = shf.options[shf.selectedIndex].getAttribute('data-tol'); const fotoData = ambilFotoKamera();

            Swal.fire({ title: 'Sinkronisasi...', html: '<span class="text-xs text-blue-300">Menyimpan log kehadiran</span>', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading(), customClass:{popup:'rounded-3xl'} });
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, namaShift: shf.value, shiftTarget: shfM, shiftKeluar: shfK, toleransi: shfTol, tipe: tipe, jarak: distance, foto: fotoData } }) });
                const result = await res.json();
                
                if (result.status === 'success') {
                    // LINK WHATSAPP DI BAWAH AGAR MUNCUL PREVIEW GAMBAR
                    const textWA = `*NOTIFIKASI ABSENSI AIMOY*%0A%0A👤 *Nama:* ${currentFace.n}%0A💼 *Shift:* ${shf.value} (${shfM}-${shfK})%0A🏢 *Lokasi:* ${out}%0A📍 *Tipe:* ${tipe.toUpperCase()}%0A⏰ *Waktu:* ${result.jam}%0A✅ *Status:* ${result.statusWaktu}%0A%0A📸 *Bukti Foto Kehadiran:*%0A${result.linkFoto}`;
                    const waLink = `https://api.whatsapp.com/send?text=${textWA}`;

                    Swal.fire({ icon: 'success', title: 'Sukses Terekam', background: '#0f172a', color: '#fff', html: `<div class="text-xs text-slate-300">Terima kasih. Log Anda tervalidasi: <b class="text-emerald-400">${result.statusWaktu}</b></div><br><a href="${waLink}" target="_blank" class="mt-2 bg-emerald-600 text-white px-4 py-3 rounded-lg font-black block text-center text-xs">💬 Laporkan ke Grup WhatsApp</a>`, showConfirmButton: false, timer: 15000, customClass: { popup: 'rounded-3xl' } }).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; document.getElementById('sel-shift').value = ""; updateUI(false); });
                } else { Swal.fire({title: 'Ditolak', text: result.message, icon: 'error', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
            } catch (e) { Swal.fire({title: 'Offline', text: 'Gagal komunikasi data.', icon: 'error', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
        }

        async function ajukanIzin() {
            isPrompting = true; const out = document.getElementById('sel-outlet').value;
            const { value: alasan } = await Swal.fire({ title: 'Form Izin / Sakit', input: 'text', inputLabel: 'Tuliskan alasan resmi:', showCancelButton: true, background: '#0f172a', color: '#fff', inputValidator: (value) => { if (!value) return 'Alasan wajib diisi!' }, customClass: { popup: 'rounded-3xl', input: 'matte-input text-white rounded-lg', confirmButton: 'bg-amber-500 rounded-lg font-black', cancelButton: 'rounded-lg bg-slate-800' } });
            if (alasan) {
                const fotoData = ambilFotoKamera();
                Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, tipe: 'Izin', keterangan: alasan, foto: fotoData } }) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        // Tautan WhatsApp khusus Izin agar melampirkan foto wajah sedih
                        const textWA = `*PENGAJUAN IZIN / SAKIT AIMOY*%0A%0A👤 *Nama:* ${currentFace.n}%0A🏢 *Lokasi:* ${out}%0A📍 *Tipe:* IZIN / SAKIT%0A📝 *Alasan:* ${alasan}%0A%0A📸 *Bukti Foto Pengajuan:*%0A${result.linkFoto}`;
                        const waLink = `https://api.whatsapp.com/send?text=${textWA}`;
                        
                        Swal.fire({title: 'Sukses', html: `Data izin diserahkan.<br><a href="${waLink}" target="_blank" class="mt-4 bg-amber-500 text-white px-4 py-3 rounded-lg font-black block text-center text-xs">💬 Laporkan Izin ke Grup WA</a>`, icon: 'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; });
                    }
                } catch (e) { Swal.fire({title:'Gagal', text:'Server Sibuk', icon:'error', background:'#0f172a', color:'#fff', customClass:{popup:'rounded-3xl'}}).then(() => { isPrompting = false; }); }
            } else { isPrompting = false; }
        }

        async function daftarkan() {
            isPrompting = true; triggerFlash();
            const nama = document.getElementById('reg-nama').value, role = document.getElementById('reg-role').value, outlet = document.getElementById('reg-outlet').value;
            if(!nama || !outlet) { isPrompting = false; return Swal.fire({title:'Peringatan', text:'Data administrasi tidak lengkap', icon:'warning', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}); }

            Swal.fire({ title: 'Mengunci Struktur Wajah...', text: 'Analisis 3D Biometrik', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading(), customClass:{popup:'rounded-3xl'} });
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })).withFaceLandmarks().withFaceDescriptor();
            
            if(!detection) { isPrompting = false; return Swal.fire({title:'Gagal Membaca', text:'Wajah kabur atau kurang pencahayaan.', icon:'error', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}); }

            if (faceMatcher) {
                const match = faceMatcher.findBestMatch(detection.descriptor);
                if (match.label !== 'unknown') {
                    const existData = JSON.parse(match.label); isPrompting = false; return Swal.fire({ icon: 'error', title: 'Gagal Kunci', html: `Biometrik wajah sudah terdaftar atas nama:<br><b class="text-rose-400 mt-2 block">${existData.n}</b>`, background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' } });
                }
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'enroll', payload: { nama, role, outlet, descriptor: Array.from(detection.descriptor) } }) });
                const data = await res.json();
                if(data.status === 'success') Swal.fire({title:'Biometrik Terkunci!', text:`Akun ${nama} resmi diaktifkan.`, icon:'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' }}).then(() => { localStorage.removeItem('aimoy_master_data'); location.reload(); });
            } catch(e) { Swal.fire('Error', 'Gagal memproses data biometrik.', 'error').then(() => { isPrompting = false; }); }
        }

        function switchTab(t) { 
            const pAbsen = document.getElementById('panel-absen'), pReg = document.getElementById('panel-reg');
            const guideBox = document.getElementById('tracking-box'); 
            const camInst = document.getElementById('cam-instruction');
            
            if (t === 'reg') {
                guideBox.className = "track-success shape-rect"; 
                document.getElementById('laser').style.display = 'none';
                camInst.innerText = "PAS PAS-KAN WAJAH ANDA DI KOTAK"; 
                camInst.className = "absolute top-10 bg-blue-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase";
                
                guideBox.style.opacity = '1'; 
                guideBox.style.width = '240px'; 
                guideBox.style.height = '240px'; 
                guideBox.style.top = '32%'; 
                guideBox.style.left = '50%'; 
                guideBox.style.transform = 'translate(-50%, -50%)';
                
                pAbsen.classList.add('hidden'); pReg.classList.remove('hidden');
            } else {
                guideBox.className = "track-search";
                guideBox.classList.remove('shape-rect'); 
                document.getElementById('laser').style.display = 'block';
                camInst.innerText = "Pindai Wajah..."; 
                camInst.className = "absolute top-10 bg-slate-800/80 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                
                guideBox.style.opacity = '0'; 
                guideBox.style.transform = 'none'; 
                pReg.classList.add('hidden'); pAbsen.classList.remove('hidden');
                updateUI(false);
            }
            
            document.getElementById('tab-absen').classList.toggle('text-blue-400', t === 'absen'); 
            document.getElementById('tab-absen').classList.toggle('text-slate-500', t === 'reg'); 
            document.getElementById('tab-reg').classList.toggle('text-blue-400', t === 'reg'); 
            document.getElementById('tab-reg').classList.toggle('text-slate-500', t === 'absen'); 
        }
    </script>
</body>
