<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aicha - Mesin Presensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #0f172a; font-family: sans-serif; }
        .camera-box { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 1.5rem; overflow: hidden; border: 4px solid #334155; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-slate-900 p-6 text-center border-b border-slate-800">
            <h1 class="text-white font-black tracking-tighter text-2xl italic">AICHA HC</h1>
            <p id="geo-status" class="text-rose-400 text-[10px] tracking-widest font-bold mt-1">📍 MENCARI SATELIT GPS...</p>
        </div>

        <div class="p-6 space-y-5">
            <div class="camera-box"><video id="video" autoplay muted playsinline></video><canvas id="overlay"></canvas></div>

            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center">
                <div>
                    <span class="text-[9px] font-black text-slate-400 uppercase">Biometrik AI</span>
                    <h2 id="ai-name" class="text-lg font-black text-slate-300 italic">Memindai...</h2>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <select id="input-outlet" class="w-full p-4 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none"></select>
                <select id="input-shift" class="w-full p-4 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none"></select>
            </div>
            
            <div id="distance-alert" class="hidden bg-rose-100 text-rose-600 p-3 rounded-xl text-xs font-bold text-center"></div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button id="btn-in" onclick="kirimAbsen('Masuk')" disabled class="bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg shadow-blue-200 disabled:opacity-30 transition-all">MASUK</button>
                <button id="btn-out" onclick="kirimAbsen('Pulang')" disabled class="bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg shadow-slate-200 disabled:opacity-30 transition-all">PULANG</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxAFoxRDA3MLERNMeovKgszipeF1sN74ifx2UXTKYgf82kUAFGSxurFJFvhPMxBTuCuqw/exec";
        const video = document.getElementById('video');
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, currentDistance = 0, isLocationValid = false;

        window.addEventListener('load', () => {
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    pos => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; document.getElementById('geo-status').innerText = "📍 GPS TERKUNCI"; document.getElementById('geo-status').className = "text-emerald-400 text-[10px] tracking-widest font-bold mt-1"; validasiJarak(); },
                    err => { document.getElementById('geo-status').innerText = "📍 IZINKAN GPS LOKASI!"; Swal.fire('Error GPS', 'Mohon izinkan akses lokasi (GPS) pada browser.', 'error'); },
                    { enableHighAccuracy: true }
                );
            }
            setTimeout(initApp, 1000);
        });

        // Rumus Haversine: Menghitung jarak bumi dalam meter
        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            Swal.fire({ title: 'Sinkronisasi...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await Promise.all([ faceapi.nets.tinyFaceDetector.loadFromUri(URL), faceapi.nets.faceLandmark68Net.loadFromUri(URL), faceapi.nets.faceRecognitionNet.loadFromUri(URL) ]);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
                const data = await res.json();
                
                dbOutlet = data.dataOutlet;
                dbShift = data.dataShift;

                const outSel = document.getElementById('input-outlet');
                outSel.innerHTML = '<option value="" disabled selected>Pilih Outlet</option>';
                dbOutlet.forEach(o => outSel.innerHTML += `<option value="${o.nama}">${o.nama}</option>`);

                const shfSel = document.getElementById('input-shift');
                shfSel.innerHTML = '<option value="" disabled selected>Pilih Shift</option>';
                dbShift.forEach(s => shfSel.innerHTML += `<option value="${s.kode}" data-jam="${s.jamMasuk}">${s.kode} (${s.jamMasuk})</option>`);

                if (data.dataKaryawan.length > 0) {
                    const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role}), [new Float32Array(k.descriptor)]));
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.40);
                }
                startCam();
            } catch (e) { Swal.fire('Error', 'Gagal memuat database.', 'error'); }
        }

        function startCam() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).then(s => { video.srcObject = s; Swal.close(); }).catch(e => Swal.fire('Error', 'Izin kamera ditolak.', 'error'));
        }

        document.getElementById('input-outlet').addEventListener('change', validasiJarak);

        function validasiJarak() {
            const outName = document.getElementById('input-outlet').value;
            const alertBox = document.getElementById('distance-alert');
            if(!outName || userLat === 0) return;

            const outlet = dbOutlet.find(o => o.nama === outName);
            currentDistance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            
            if (currentDistance > outlet.radius) {
                isLocationValid = false;
                alertBox.classList.remove('hidden');
                alertBox.innerHTML = `⚠️ Jarak Anda <b>${Math.round(currentDistance)} m</b>. Maksimal ${outlet.radius} m dari Outlet!`;
                updateUI(currentFace !== null);
            } else {
                isLocationValid = true;
                alertBox.classList.add('hidden');
                updateUI(currentFace !== null);
            }
        }

        video.addEventListener('play', () => {
            const canvas = document.getElementById('overlay');
            const size = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, size);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, size);
                canvas.getContext('2d').clearRect(0, 0, size.width, size.height);

                if (detections.length > 0 && faceMatcher) {
                    const match = faceMatcher.findBestMatch(resized[0].descriptor);
                    if (match.label !== 'unknown') {
                        currentFace = JSON.parse(match.label);
                        updateUI(true);
                    } else { updateUI(false); }
                } else { updateUI(false); }
            }, 800);
        });

        function updateUI(found) {
            const nameEl = document.getElementById('ai-name');
            const shfSel = document.getElementById('input-shift').value;
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out');
            
            if (found && currentFace) {
                nameEl.innerText = currentFace.n; nameEl.className = "text-lg font-black text-blue-600";
                if (isLocationValid && shfSel) { btnIn.disabled = false; btnOut.disabled = false; } else { btnIn.disabled = true; btnOut.disabled = true; }
            } else {
                nameEl.innerText = "Memindai..."; nameEl.className = "text-lg font-black text-slate-300 italic";
                currentFace = null; btnIn.disabled = true; btnOut.disabled = true;
            }
        }

        document.getElementById('input-shift').addEventListener('change', () => updateUI(currentFace !== null));

        async function kirimAbsen(tipe) {
            const out = document.getElementById('input-outlet').value;
            const shf = document.getElementById('input-shift');
            const shfT = shf.options[shf.selectedIndex].getAttribute('data-jam');

            Swal.fire({ title: 'Merekam Log...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, namaShift: shf.value, shiftTarget: shfT, tipe: tipe, jarak: currentDistance } }) 
                });
                const result = await res.json();
                if (result.status === 'success') {
                    Swal.fire('Terekam!', `<b>${currentFace.n}</b><br>Jarak Lokasi: ${Math.round(currentDistance)} m (Valid)<br>Status: ${result.statusWaktu}`, 'success');
                    document.getElementById('input-shift').value = ""; updateUI(false);
                }
            } catch (e) { Swal.fire('Gagal', 'Gangguan server.', 'error'); }
        }
    </script>
</body>
</html>
