<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .camera-view { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 1.5rem; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .nav-tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-slate-900 p-6 text-center">
            <h1 class="text-white font-bold tracking-tighter text-xl">HC ATTENDANCE</h1>
            <p id="status-text" class="text-slate-400 text-[10px] tracking-widest mt-1 uppercase">Sistem Inisialisasi...</p>
        </div>

        <div class="flex border-b border-slate-100 font-bold text-sm text-slate-400">
            <button onclick="switchTab('absen')" id="tab-absen" class="nav-tab active flex-1 py-4">ABSEN</button>
            <button onclick="switchTab('hrd')" id="tab-hrd" class="nav-tab flex-1 py-4">DAFTAR</button>
        </div>

        <div class="p-6 space-y-6">
            <div class="camera-view shadow-inner">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay"></canvas>
            </div>

            <div id="panel-absen" class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Terdeteksi:</p>
                        <h2 id="user-name" class="text-lg font-bold text-slate-300 italic">Mencari wajah...</h2>
                    </div>
                    <span id="user-role" class="hidden px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-[10px] font-black uppercase"></span>
                </div>

                <select id="outlet" class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="" disabled selected>PILIH OUTLET</option>
                    <option value="Outlet Pusat">Outlet Pusat</option>
                    <option value="Outlet 02">Outlet 02</option>
                    <option value="Outlet 03">Outlet 03</option>
                </select>

                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-in" onclick="postAbsen('Masuk')" disabled class="bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 disabled:opacity-20">MASUK</button>
                    <button id="btn-out" onclick="postAbsen('Pulang')" disabled class="bg-slate-200 text-slate-500 py-4 rounded-2xl font-bold disabled:opacity-20">PULANG</button>
                </div>
            </div>

            <div id="panel-hrd" class="hidden space-y-4">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap Karyawan" class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-sm outline-none">
                <select id="reg-role" class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-sm outline-none">
                    <option value="Staff">Role: Staff</option>
                    <option value="Senior">Role: Senior</option>
                </select>
                <button onclick="register()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Kunci Biometrik Wajah</button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI API ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxkNMsAGS1F24ZGJznLFLjcLfFPP3CsrjLAfyPt6yCs9KDZZco5HgDwjwPKh2_1qWhjjw/exec"; 
        // -----------------------

        const video = document.getElementById('video');
        const statusText = document.getElementById('status-text');
        let faceMatcher = null, currentFace = null;

        async function init() {
            Swal.fire({ title: 'Memuat AI...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
                const data = await res.json();
                
                if (data.dataKaryawan.length > 0) {
                    const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role}), [new Float32Array(k.descriptor)]));
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.4);
                }
                
                startCamera();
            } catch (e) {
                Swal.fire('Error API', 'Pastikan URL API sudah benar dan dideploy sebagai "Anyone"', 'error');
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(s => {
                    video.srcObject = s;
                    statusText.innerText = "SISTEM ONLINE";
                    Swal.close();
                })
                .catch(e => Swal.fire('Error Kamera', 'Akses ditolak. Gunakan Chrome/Safari.', 'error'));
        }

        video.addEventListener('play', () => {
            const canvas = document.getElementById('overlay');
            const size = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, size);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, size);
                canvas.getContext('2d').clearRect(0, 0, size.width, size.height);

                if (detections.length > 0 && faceMatcher && !document.getElementById('panel-absen').classList.contains('hidden')) {
                    const match = faceMatcher.findBestMatch(resized[0].descriptor);
                    if (match.label !== 'unknown') {
                        const info = JSON.parse(match.label);
                        currentFace = { nama: info.n, role: info.r, acc: (100 - (match.distance * 100)).toFixed(0) + "%" };
                        updateUI(true);
                    } else {
                        currentFace = null;
                        updateUI(false);
                    }
                } else {
                    faceapi.draw.drawFaceLandmarks(canvas, resized);
                }
            }, 600);
        });

        function updateUI(found) {
            const nameEl = document.getElementById('user-name');
            const roleEl = document.getElementById('user-role');
            const out = document.getElementById('outlet').value;

            if (found && currentFace) {
                nameEl.innerText = currentFace.nama;
                nameEl.classList.replace('text-slate-300', 'text-blue-600');
                roleEl.innerText = currentFace.role;
                roleEl.classList.remove('hidden');
                if (out) { document.getElementById('btn-in').disabled = false; document.getElementById('btn-out').disabled = false; }
            } else {
                nameEl.innerText = "Mencari wajah...";
                nameEl.classList.replace('text-blue-600', 'text-slate-300');
                roleEl.classList.add('hidden');
                document.getElementById('btn-in').disabled = true; document.getElementById('btn-out').disabled = true;
            }
        }

        async function postAbsen(tipe) {
            const out = document.getElementById('outlet').value;
            Swal.fire({ title: 'Mengirim Absen...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { ...currentFace, outlet: out, tipe: tipe } }) });
            const result = await res.json();
            if (result.status === 'success') Swal.fire('Berhasil', `${currentFace.nama} absen ${tipe} tercatat.`, 'success');
        }

        async function register() {
            const nama = document.getElementById('reg-nama').value;
            if (!nama) return Swal.fire('Gagal', 'Nama wajib diisi', 'warning');
            
            Swal.fire({ title: 'Scanning...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!det) return Swal.fire('Gagal', 'Wajah tidak terdeteksi', 'error');

            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ 
                action: 'enroll', 
                payload: { nama: nama, role: document.getElementById('reg-role').value, outlet: 'Global', descriptor: Array.from(det.descriptor) } 
            }) });
            
            const result = await res.json();
            if (result.status === 'success') Swal.fire('Sukses', 'Wajah terdaftar! Refresh aplikasi.', 'success').then(() => location.reload());
        }

        function switchTab(t) {
            document.getElementById('panel-absen').classList.toggle('hidden', t === 'hrd');
            document.getElementById('panel-hrd').classList.toggle('hidden', t === 'absen');
            document.getElementById('tab-absen').classList.toggle('active', t === 'absen');
            document.getElementById('tab-hrd').classList.toggle('active', t === 'hrd');
        }

        init();
    </script>
</body>
</html>
