<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiMoy Absen</title>
    
    <!-- PWA META TAGS -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #020617; font-family: sans-serif; overflow: hidden; }
        
        /* Kamera Full Area */
        .camera-container { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; z-index: 0; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Glassmorphism Classes */
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        
        /* Efek Pemindai Dinamis */
        @keyframes pulse-white { 0%, 100% { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 15px rgba(255,255,255,0.1); } 50% { border-color: rgba(255,255,255,0.8); box-shadow: 0 0 25px rgba(255,255,255,0.4); } }
        @keyframes pulse-yellow { 0%, 100% { border-color: rgba(251,191,36,0.6); box-shadow: 0 0 20px rgba(251,191,36,0.3); } 50% { border-color: rgba(251,191,36,1); box-shadow: 0 0 40px rgba(251,191,36,0.8); } }
        
        .box-searching { animation: pulse-white 2s infinite; border-style: dashed; }
        .box-liveness { animation: pulse-yellow 1.5s infinite; border-style: dashed; }
        .box-success { border-color: #10b981; border-style: solid; box-shadow: 0 0 30px rgba(16, 185, 129, 0.6); transform: scale(1.05); transition: all 0.4s ease-out; }
        .box-error { border-color: #f43f5e; border-style: solid; box-shadow: 0 0 30px rgba(244, 63, 94, 0.6); transition: all 0.3s; }
        
        /* Kustomisasi Scrollbar Select agar cantik di mode gelap */
        select option { background: #0f172a; color: white; }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center text-white select-none">

    <!-- RANGKA MESIN KIOSK -->
    <div class="relative w-full max-w-md mx-auto h-full sm:h-[95vh] sm:rounded-[2.5rem] overflow-hidden shadow-2xl sm:border-[6px] sm:border-slate-800 flex flex-col">
        
        <!-- 1. KAMERA BACKGROUND -->
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay" class="z-10"></canvas>
            
            <!-- OVERLAY GELAP AGAR UI TERLIHAT -->
            <div class="absolute inset-0 bg-gradient-to-b from-slate-900/80 via-transparent to-slate-900/95 z-20 pointer-events-none"></div>
        </div>

        <!-- 2. TOP BAR (FULLSCREEN, GPS, HEADER) -->
        <div class="relative z-30 flex justify-between items-start p-5">
            <div>
                <h1 class="text-xl font-black tracking-tighter italic text-white drop-shadow-md">AIMOY KIOSK</h1>
                <div id="geo-status" class="flex items-center gap-1 mt-1">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span></span>
                    <span class="text-rose-400 text-[9px] tracking-widest font-bold drop-shadow">MENCARI GPS...</span>
                </div>
            </div>
            <button onclick="toggleFullScreen()" class="glass-panel p-2 rounded-full hover:bg-white/10 transition">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>

        <!-- 3. JAM DIGITAL SUPER BESAR -->
        <div class="relative z-30 flex flex-col items-center mt-2 pointer-events-none drop-shadow-2xl">
            <div id="real-time-clock" class="text-6xl font-black tracking-tighter text-white">00:00:00</div>
            <div id="real-time-date" class="text-xs font-bold text-slate-300 tracking-widest uppercase mt-1">Memuat Tanggal...</div>
        </div>

        <!-- 4. INDIKATOR PEMINDAI DINAMIS (DYNAMIC BOUNDING BOX) -->
        <div class="absolute inset-0 z-30 flex flex-col items-center justify-center pointer-events-none mt-10">
            <!-- Kotak Wajah -->
            <div id="face-guide-box" class="w-[190px] h-[260px] border-[4px] rounded-[50%] box-searching"></div>
            
            <!-- Label Instruksi -->
            <div id="cam-instruction" class="mt-6 glass-panel px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-lg transition-colors duration-300">
                SEJAJARKAN WAJAH DI SINI
            </div>
        </div>

        <!-- 5. KARTU STATUS PERSONALISASI (MUNCUL SAAT WAJAH DIKENALI) -->
        <div class="absolute bottom-[200px] left-4 right-4 z-40 flex justify-center pointer-events-none">
            <div id="greeting-card" class="glass-card w-full rounded-2xl p-4 transform translate-y-10 opacity-0 transition-all duration-500 ease-out">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center border border-blue-400/50">
                        <span class="text-2xl">✨</span>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Selamat Datang,</p>
                        <h2 id="ai-name" class="text-lg font-black text-white truncate w-48">Mencari...</h2>
                        <p id="ai-status" class="text-xs font-bold text-emerald-400 mt-0.5">Sistem Siap</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 6. CONTROL PANEL BAWAH (GLASSMORPHISM DOCK) -->
        <div class="relative z-40 mt-auto w-full px-4 pb-6 pt-10">
            
            <!-- Alert GPS Radius -->
            <div id="dist-alert" class="hidden mb-3 glass-card bg-rose-500/20 border-rose-500/50 text-rose-300 p-2 rounded-xl text-[10px] font-bold text-center animate-pulse"></div>

            <!-- TAB ABSENSI (Default) -->
            <div id="panel-absen" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <select id="sel-outlet" onchange="loadShiftDropdown()" class="w-full p-3 glass-input rounded-xl text-xs font-bold outline-none appearance-none text-center"><option value="" disabled selected>Pilih Outlet</option></select>
                    <select id="sel-shift" class="w-full p-3 glass-input rounded-xl text-xs font-bold outline-none appearance-none text-center"><option value="" disabled selected>Pilih Shift</option></select>
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <button id="btn-in" onclick="kirimAbsen('Masuk')" disabled class="glass-panel bg-blue-600/60 hover:bg-blue-600 border-blue-400/50 text-white py-3.5 rounded-xl font-black shadow-lg disabled:opacity-20 disabled:cursor-not-allowed transition-all text-xs tracking-wider">MASUK</button>
                    <button id="btn-out" onclick="kirimAbsen('Pulang')" disabled class="glass-panel bg-slate-800/60 hover:bg-slate-800 text-white py-3.5 rounded-xl font-black shadow-lg disabled:opacity-20 disabled:cursor-not-allowed transition-all text-xs tracking-wider">PULANG</button>
                    <button id="btn-izin" onclick="ajukanIzin()" disabled class="glass-panel bg-amber-500/60 hover:bg-amber-500 border-amber-400/50 text-white py-3.5 rounded-xl font-black shadow-lg disabled:opacity-20 disabled:cursor-not-allowed transition-all text-xs tracking-wider">IZIN / SAKIT</button>
                </div>
            </div>

            <!-- TAB REGISTRASI (Hidden Default) -->
            <div id="panel-reg" class="hidden space-y-3 glass-panel p-4 rounded-2xl">
                <div class="text-center mb-2"><h3 class="font-black text-sm text-blue-400">Pendaftaran Biometrik</h3></div>
                <input type="text" id="reg-nama" placeholder="Nama Lengkap Staf" class="w-full p-3 glass-input rounded-xl text-xs font-bold outline-none text-center">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3 glass-input rounded-xl text-xs font-bold outline-none text-center"><option value="Staff">Role: Staff</option><option value="Senior">Role: Senior</option></select>
                    <select id="reg-outlet" class="p-3 glass-input rounded-xl text-xs font-bold outline-none text-center"><option value="" disabled selected>Penempatan</option></select>
                </div>
                <button onclick="daftarkan()" class="w-full glass-panel bg-emerald-500/80 hover:bg-emerald-500 border-emerald-400/50 text-white py-3 rounded-xl font-black shadow-lg transition-all mt-1">KUNCI WAJAH SEKARANG</button>
            </div>

            <!-- TOGGLE MENU BAWAH KECIL -->
            <div class="flex justify-center gap-6 mt-4 opacity-50 text-[9px] font-bold tracking-widest uppercase">
                <span id="tab-absen" onclick="switchTab('absen')" class="cursor-pointer text-blue-400">Absensi</span>
                <span id="tab-reg" onclick="switchTab('reg')" class="cursor-pointer hover:text-white transition">Registrasi Baru</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxkOCboooYMfJM2W-1WKVu_dHJbfKHdd28TMuxUVkgSotvkf9TERgTQcnXHXDBixEC6kA/exec"; // <--- JANGAN LUPA UPDATE URL GOOGLE APPS SCRIPT ANDA
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, distance = 0, isLocValid = false, lastRecognizedName = null;
        let isPrompting = false, isLivenessPassed = false;

        // 1. FUNGSI JAM DIGITAL REAL-TIME
        setInterval(() => {
            const now = new Date();
            document.getElementById('real-time-clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/\./g, ':');
            document.getElementById('real-time-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);

        // 2. FUNGSI FULLSCREEN
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    Swal.fire('Info', 'Browser tidak mendukung layar penuh.', 'info');
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        window.addEventListener('load', () => {
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    pos => { 
                        userLat = pos.coords.latitude; userLng = pos.coords.longitude; 
                        document.getElementById('geo-status').innerHTML = `<span class="relative flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span><span class="text-emerald-400 text-[9px] tracking-widest font-bold drop-shadow">GPS TERKUNCI</span>`;
                        cekJarak(); 
                    },
                    err => { Swal.fire('Info', 'GPS tidak diizinkan. Hanya fitur IZIN yang aktif.', 'info'); }, 
                    { enableHighAccuracy: true }
                );
            }
            setTimeout(initApp, 800);
        });

        function hitungJarak(lat1, lon1, lat2Str, lon2Str) {
            const lat2 = parseFloat(lat2Str), lon2 = parseFloat(lon2Str);
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            Swal.fire({ title: 'Menyiapkan AI...', background: '#0f172a', color: '#fff', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await Promise.all([ 
                faceapi.nets.tinyFaceDetector.loadFromUri(URL), 
                faceapi.nets.faceLandmark68Net.loadFromUri(URL), 
                faceapi.nets.faceRecognitionNet.loadFromUri(URL),
                faceapi.nets.faceExpressionNet.loadFromUri(URL) 
            ]);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
                const data = await res.json();
                dbOutlet = data.dataOutlet; dbShift = data.dataShift;

                let outHtml = '<option value="" disabled selected>Pilih Outlet</option>';
                dbOutlet.forEach(o => { outHtml += `<option value="${o.nama}">${o.nama}</option>`; });
                document.getElementById('sel-outlet').innerHTML = outHtml; document.getElementById('reg-outlet').innerHTML = outHtml;

                if (data.dataKaryawan.length > 0) {
                    const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role, o: k.outlet}), [new Float32Array(k.descriptor)]));
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.40);
                }
                
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).then(s => { video.srcObject = s; Swal.close(); }).catch(e => Swal.fire('Error', 'Kamera diblokir.', 'error'));
            } catch (e) { Swal.fire('Error', 'Gagal memuat database.', 'error'); }
        }

        function loadShiftDropdown() {
            cekJarak();
            const outletName = document.getElementById('sel-outlet').value;
            const shiftSelect = document.getElementById('sel-shift');
            const shiftTersedia = dbShift.filter(s => s.outlet === outletName);
            
            if(shiftTersedia.length === 0) { shiftSelect.innerHTML = '<option value="" disabled selected>Tidak Ada Jadwal</option>'; } 
            else {
                shiftSelect.innerHTML = '<option value="" disabled selected>Pilih Shift</option>';
                shiftTersedia.forEach(s => { shiftSelect.innerHTML += `<option value="${s.kode}" data-jamm="${s.jamMasuk}" data-jamk="${s.jamKeluar}" data-tol="${s.toleransi}">${s.kode} (${s.jamMasuk}-${s.jamKeluar})</option>`; });
            }
        }

        function cariShiftOtomatis(outletName) {
            const shifts = dbShift.filter(s => s.outlet === outletName);
            if (shifts.length === 0) return null;
            const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes();
            let bestShift = shifts[0], minDiff = Infinity;
            shifts.forEach(s => {
                const mMasuk = parseInt(s.jamMasuk.split(':')[0]) * 60 + parseInt(s.jamMasuk.split(':')[1]);
                const mKeluar = parseInt(s.jamKeluar.split(':')[0]) * 60 + parseInt(s.jamKeluar.split(':')[1]);
                const closest = Math.min(Math.abs(currentMins - mMasuk), Math.abs(currentMins - mKeluar));
                if(closest < minDiff) { minDiff = closest; bestShift = s; }
            });
            return bestShift;
        }

        function cekJarak() {
            const outName = document.getElementById('sel-outlet').value, alertBox = document.getElementById('dist-alert');
            if(!outName || userLat === 0) return;
            const outlet = dbOutlet.find(o => o.nama === outName);
            if(!outlet) return; distance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            
            if (distance > outlet.radius) { isLocValid = false; alertBox.classList.remove('hidden'); alertBox.innerHTML = `⚠️ Di Luar Area! Jarak Anda ${Math.round(distance)}m. Maks ${outlet.radius}m`; updateUI(currentFace !== null, "ERROR"); } 
            else { isLocValid = true; alertBox.classList.add('hidden'); updateUI(currentFace !== null, isLivenessPassed ? "READY" : "LIVENESS_WAIT"); }
        }

        video.addEventListener('loadedmetadata', () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; });

        video.addEventListener('play', () => {
            const size = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, size);
            
            setInterval(async () => {
                if(isPrompting) return;
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceExpressions().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, size); canvas.getContext('2d').clearRect(0, 0, size.width, size.height);

                if (!document.getElementById('panel-absen').classList.contains('hidden') && detections.length > 0 && faceMatcher) {
                    const match = faceMatcher.findBestMatch(resized[0].descriptor);
                    if (match.label !== 'unknown') {
                        const info = JSON.parse(match.label);
                        
                        // LIVENESS DETECTION: Tersenyum
                        const expressions = resized[0].expressions;
                        if (expressions.happy > 0.6) { isLivenessPassed = true; }

                        if (!isLivenessPassed) {
                            currentFace = info; updateUI(true, "LIVENESS_WAIT"); return; 
                        }
                        
                        // Jika Lolos
                        if(lastRecognizedName !== info.n) { 
                            lastRecognizedName = info.n; currentFace = info; 
                            const outSel = document.getElementById('sel-outlet'); 
                            if(info.o) { outSel.value = info.o; loadShiftDropdown(); } 
                            
                            const autoShift = cariShiftOtomatis(info.o);
                            if(autoShift) {
                                document.getElementById('sel-shift').value = autoShift.kode;
                                updateUI(true, isLocValid ? "READY" : "ERROR");
                                munculkanPopupAutoAbsen(info, autoShift);
                            } else { updateUI(true, isLocValid ? "READY" : "ERROR"); }
                        } else { currentFace = info; updateUI(true, isLocValid ? "READY" : "ERROR"); }
                    } else { lastRecognizedName = null; isLivenessPassed = false; updateUI(false); }
                } else { lastRecognizedName = null; isLivenessPassed = false; updateUI(false); if (!document.getElementById('panel-reg').classList.contains('hidden')) { faceapi.draw.drawFaceLandmarks(canvas, resized); } }
            }, 800);
        });

        // 3. LOGIKA UI UPDATE (BOX WARNA & KARTU GREETING)
        function updateUI(found, state = "SEARCHING") {
            const box = document.getElementById('face-guide-box');
            const camInstruction = document.getElementById('cam-instruction');
            const greetingCard = document.getElementById('greeting-card');
            const nameEl = document.getElementById('ai-name');
            const statusEl = document.getElementById('ai-status');
            
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out'), btnIzin = document.getElementById('btn-izin');
            const outSel = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift').value;
            
            if (found && currentFace) {
                // Tampilkan Greeting Card
                greetingCard.classList.remove('translate-y-10', 'opacity-0');
                nameEl.innerText = currentFace.n;

                if (state === "LIVENESS_WAIT") {
                    box.className = "w-[190px] h-[260px] border-[4px] rounded-[50%] box-liveness";
                    camInstruction.innerText = "😊 SILAKAN TERSENYUM"; camInstruction.className = "mt-6 bg-amber-500 px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-[0_0_15px_rgba(251,191,36,0.6)] transition-colors duration-300";
                    statusEl.innerText = "Menunggu verifikasi kehidupan..."; statusEl.className = "text-xs font-bold text-amber-400 mt-0.5";
                    btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true;
                } else if (state === "ERROR") {
                    box.className = "w-[190px] h-[260px] border-[4px] rounded-[50%] box-error";
                    camInstruction.innerText = "⛔ DI LUAR RADIUS TOKO"; camInstruction.className = "mt-6 bg-rose-500 px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-[0_0_15px_rgba(244,63,94,0.6)] transition-colors duration-300";
                    statusEl.innerText = "Kembali ke area Outlet!"; statusEl.className = "text-xs font-bold text-rose-400 mt-0.5";
                    btnIn.disabled = true; btnOut.disabled = true; 
                    if(outSel) btnIzin.disabled = false;
                } else {
                    box.className = "w-[190px] h-[260px] border-[4px] rounded-[50%] box-success";
                    camInstruction.innerText = "✅ WAJAH TERKUNCI"; camInstruction.className = "mt-6 bg-emerald-500 px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-[0_0_15px_rgba(16,185,129,0.6)] transition-colors duration-300";
                    statusEl.innerText = shf ? `Shift Terdeteksi: ${shf}` : "Silakan Pilih Shift Anda"; statusEl.className = "text-xs font-bold text-emerald-400 mt-0.5";
                    
                    if(outSel) btnIzin.disabled = false; else btnIzin.disabled = true;
                    if (isLocValid && shf) { btnIn.disabled = false; btnOut.disabled = false; } else { btnIn.disabled = true; btnOut.disabled = true; }
                }
            } else { 
                // Sembunyikan Greeting Card
                greetingCard.classList.add('translate-y-10', 'opacity-0');
                
                box.className = "w-[190px] h-[260px] border-[4px] rounded-[50%] box-searching";
                camInstruction.innerText = "SEJAJARKAN WAJAH DI SINI"; camInstruction.className = "mt-6 glass-panel px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-lg transition-colors duration-300";
                
                currentFace = null; btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true; 
            }
        }

        document.getElementById('sel-shift').addEventListener('change', () => updateUI(currentFace !== null, isLocValid ? "READY" : "ERROR"));

        function munculkanPopupAutoAbsen(faceInfo, shift) {
            isPrompting = true; cekJarak();
            if(!isLocValid) {
                Swal.fire({ icon: 'warning', title: 'Di Luar Radius!', text: 'Wajah cocok, tapi GPS Anda di luar area toko.', confirmButtonText: 'Tutup', background: '#0f172a', color: '#fff' }).then(() => { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; }); return;
            }
            Swal.fire({
                title: `Halo, ${faceInfo.n}! 👋`,
                html: `<div class="text-slate-300 text-sm">Outlet: <b class="text-white">${faceInfo.o}</b><br><br>Shift saat ini:<br><div class="bg-blue-600/20 border border-blue-500 rounded-xl py-2 mt-2 font-black text-xl text-blue-400">${shift.kode} <span class="text-xs font-normal text-blue-300 block">${shift.jamMasuk} - ${shift.jamKeluar}</span></div></div>`,
                showDenyButton: true, showCancelButton: true, background: '#0f172a', color: '#fff',
                confirmButtonText: 'MASUK KERJA', confirmButtonColor: '#2563eb',
                denyButtonText: 'PULANG KERJA', denyButtonColor: '#1e293b',
                cancelButtonText: 'Batal', allowOutsideClick: false,
                customClass: { popup: 'rounded-3xl border border-slate-700', confirmButton: 'rounded-xl font-black', denyButton: 'rounded-xl font-black border border-slate-600', cancelButton: 'rounded-xl' }
            }).then((result) => {
                if (result.isConfirmed) { kirimAbsen('Masuk'); } 
                else if (result.isDenied) { kirimAbsen('Pulang'); } 
                else { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; } 
            });
        }

        function ambilFotoKamera() {
            const tempCanvas = document.createElement('canvas'); const scale = 480 / video.videoWidth; 
            tempCanvas.width = 480; tempCanvas.height = video.videoHeight * scale;
            const ctx = tempCanvas.getContext('2d'); ctx.translate(tempCanvas.width, 0); ctx.scale(-1, 1); 
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            return tempCanvas.toDataURL('image/jpeg', 0.6);
        }

        async function kirimAbsen(tipe) {
            isPrompting = true; 
            const out = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift');
            const shfM = shf.options[shf.selectedIndex].getAttribute('data-jamm'), shfK = shf.options[shf.selectedIndex].getAttribute('data-jamk'), shfTol = shf.options[shf.selectedIndex].getAttribute('data-tol');
            const fotoData = ambilFotoKamera();

            Swal.fire({ title: 'Merekam Log...', html: 'Mohon tunggu', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, namaShift: shf.value, shiftTarget: shfM, shiftKeluar: shfK, toleransi: shfTol, tipe: tipe, jarak: distance, foto: fotoData } }) });
                const result = await res.json();
                
                if (result.status === 'success') {
                    const textWA = `*NOTIFIKASI ABSENSI AIMOY*%0A%0A👤 *Nama:* ${currentFace.n}%0A💼 *Shift:* ${shf.value} (${shfM}-${shfK})%0A🏢 *Lokasi:* ${out}%0A📍 *Tipe:* ${tipe.toUpperCase()}%0A⏰ *Waktu:* ${result.jam}%0A✅ *Status:* ${result.statusWaktu}%0A📸 *Bukti Foto:* ${result.linkFoto}`;
                    const waLink = `https://api.whatsapp.com/send?text=${textWA}`;

                    Swal.fire({
                        icon: 'success', title: 'Berhasil!', background: '#0f172a', color: '#fff',
                        html: `<div class="text-sm text-slate-300"><b>${currentFace.n}</b> berhasil ${tipe}.<br>Status: <b class="text-emerald-400">${result.statusWaktu}</b></div><br><a href="${waLink}" target="_blank" class="mt-2 bg-emerald-500/20 border border-emerald-500 text-emerald-400 px-4 py-3 rounded-xl font-black block text-center uppercase tracking-widest text-xs hover:bg-emerald-500 hover:text-white transition-all">💬 Kirim ke Grup WA</a>`,
                        showConfirmButton: false, timer: 15000, customClass: { popup: 'rounded-3xl border border-slate-700' }
                    }).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; document.getElementById('sel-shift').value = ""; updateUI(false); });
                } else { Swal.fire({title: 'Ditolak', text: result.message, icon: 'error', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl border border-slate-700' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
            } catch (e) { Swal.fire({title: 'Gagal', text: 'Gangguan server', icon: 'error', background: '#0f172a', color: '#fff'}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
        }

        async function ajukanIzin() {
            isPrompting = true;
            const out = document.getElementById('sel-outlet').value;
            const { value: alasan } = await Swal.fire({ title: 'Pengajuan Izin', input: 'text', inputLabel: 'Alasan Izin/Sakit', showCancelButton: true, background: '#0f172a', color: '#fff', inputValidator: (value) => { if (!value) return 'Wajib diisi!' }, customClass: { popup: 'rounded-3xl border border-slate-700', input: 'text-white' } });
            if (alasan) {
                const fotoData = ambilFotoKamera();
                Swal.fire({ title: 'Merekam Izin...', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, tipe: 'Izin', keterangan: alasan, foto: fotoData } }) });
                    const result = await res.json();
                    if (result.status === 'success') Swal.fire({title: 'Terekam!', html: `Izin <b>${currentFace.n}</b> dicatat.`, icon: 'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl border border-slate-700' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; });
                } catch (e) { Swal.fire('Gagal', 'Gangguan server.', 'error').then(() => { isPrompting = false; }); }
            } else { isPrompting = false; }
        }

        async function daftarkan() {
            isPrompting = true;
            const nama = document.getElementById('reg-nama').value, role = document.getElementById('reg-role').value, outlet = document.getElementById('reg-outlet').value;
            if(!nama || !outlet) { isPrompting = false; return Swal.fire({title:'Peringatan', text:'Nama dan Outlet wajib diisi!', icon:'warning', background: '#0f172a', color: '#fff'}); }

            Swal.fire({ title: 'Menganalisis Biometrik...', text: 'Tahan Posisi Wajah', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading() });
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(!detection) { isPrompting = false; return Swal.fire({title:'Gagal', text:'Wajah tidak jelas.', icon:'error', background: '#0f172a', color: '#fff'}); }

            if (faceMatcher) {
                const match = faceMatcher.findBestMatch(detection.descriptor);
                if (match.label !== 'unknown') {
                    const existData = JSON.parse(match.label);
                    isPrompting = false; return Swal.fire({ icon: 'error', title: 'Ditolak', html: `Wajah sudah terdaftar atas nama:<br><b class="text-xl text-blue-400">${existData.n}</b>`, background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl border border-slate-700' } });
                }
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'enroll', payload: { nama, role, outlet, descriptor: Array.from(detection.descriptor) } }) });
                const data = await res.json();
                if(data.status === 'success') Swal.fire({title:'Tersimpan!', text:`Wajah ${nama} dikunci.`, icon:'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl border border-slate-700' }}).then(() => location.reload());
            } catch(e) { Swal.fire('Error', 'Gagal menyimpan.', 'error').then(() => { isPrompting = false; }); }
        }

        function switchTab(t) { 
            document.getElementById('panel-absen').classList.toggle('hidden', t === 'reg'); 
            document.getElementById('panel-reg').classList.toggle('hidden', t === 'absen'); 
            document.getElementById('tab-absen').classList.toggle('text-blue-400', t === 'absen'); 
            document.getElementById('tab-absen').classList.toggle('text-slate-500', t === 'reg'); 
            document.getElementById('tab-reg').classList.toggle('text-blue-400', t === 'reg'); 
            document.getElementById('tab-reg').classList.toggle('text-slate-500', t === 'absen'); 
        }
    </script>
</body>
