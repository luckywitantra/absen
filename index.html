<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SI-AMoy (Sistem Absensi Aicha Momoyo)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
       body { background: #020617; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .camera-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 2rem; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Tema Dark Glassmorphism */
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; }
        .glass-input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); outline: none; }
        
        /* HUD Scanner (Menggantikan face-guide lama) */
        .hud-box { position: absolute; width: 200px; height: 260px; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; }
        .corner { position: absolute; width: 30px; height: 30px; border-color: rgba(255,255,255,0.5); border-style: solid; transition: all 0.3s; }
        .corner-tl { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 1rem; }
        .corner-tr { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 1rem; }
        .corner-bl { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 1rem; }
        .corner-br { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 1rem; }

        /* Animasi Status HUD */
        @keyframes scan-laser { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .laser-line { position: absolute; width: 100%; height: 2px; background: #3b82f6; box-shadow: 0 0 15px 2px #3b82f6; animation: scan-laser 2.5s infinite linear; }
        
        .status-search .corner { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .status-wait .corner { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245,158,11,0.5); transform: scale(1.05); }
        .status-success .corner { border-color: #10b981; box-shadow: 0 0 20px rgba(16,185,129,0.5); transform: scale(1.05); }

        .tab-btn.active { color: #60a5fa; border-bottom: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        select option { background: #0f172a; color: white; padding: 10px; }
        div:where(.swal2-container) .swal2-popup { border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); background: #0f172a !important; color: white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md mx-auto h-full sm:h-[95vh] sm:rounded-[2.5rem] overflow-hidden glass-panel shadow-2xl flex flex-col relative text-white">
        
        <!-- Header -->
        <div class="relative z-30 p-6 flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white drop-shadow-lg">SI-AMoy</h1>
                <p id="geo-status" class="text-rose-400 text-[10px] tracking-widest font-bold mt-1 animate-pulse">📍 MENCARI GPS...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Kiosk System</p>
                <div class="w-2 h-2 rounded-full bg-emerald-500 ml-auto mt-1 shadow-[0_0_8px_#10b981]"></div>
            </div>
        </div>

        <!-- Area Kamera & HUD -->
        <div class="px-6 flex-1 flex flex-col justify-center">
            <div class="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay" class="z-10"></canvas>
                
                <!-- HUD Pemindai Cerdas -->
                <div id="hud-scanner" class="hud-box status-search">
                    <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div><div class="corner corner-br"></div>
                    <div id="laser" class="laser-line"></div>
                </div>

                <div class="absolute bottom-4 left-0 right-0 z-20 flex justify-center">
                    <div id="cam-instruction" class="bg-slate-900/80 backdrop-blur px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-lg transition-colors">
                        SEJAJARKAN WAJAH
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel Kendali Bawah -->
        <div class="mt-auto w-full px-6 pb-6 pt-4 bg-gradient-to-t from-[#020617] to-transparent">
            
            <div class="flex mb-4 border-b border-slate-700/50">
                <button onclick="switchTab('absen')" id="tab-absen" class="tab-btn active flex-1 py-3 text-[11px] font-black transition-all tracking-widest">ABSENSI</button>
                <button onclick="switchTab('reg')" id="tab-reg" class="tab-btn flex-1 py-3 text-[11px] font-black text-slate-500 transition-all tracking-widest">REGISTRASI</button>
            </div>

            <!-- TAB ABSENSI -->
            <div id="panel-absen" class="space-y-3">
                <div class="flex items-center gap-3 bg-white/5 p-3 rounded-2xl border border-white/10">
                    <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-600"><span id="avatar-icon">👤</span></div>
                    <div class="flex-1 overflow-hidden">
                        <h2 id="ai-name" class="text-sm font-black text-slate-300 truncate">Memindai Biometrik...</h2>
                    </div>
                </div>

                <div id="dist-alert" class="hidden bg-rose-500/20 border border-rose-500/50 text-rose-300 p-2 rounded-xl text-[10px] font-bold text-center"></div>

                <div class="grid grid-cols-2 gap-2">
                    <select id="sel-outlet" onchange="loadShiftDropdown()" class="w-full p-3.5 glass-input rounded-xl text-[11px] font-bold outline-none text-center appearance-none"><option value="" disabled selected>Pilih Outlet</option></select>
                    <select id="sel-shift" class="w-full p-3.5 glass-input rounded-xl text-[11px] font-bold outline-none text-center appearance-none"><option value="" disabled selected>Pilih Shift</option></select>
                </div>
                
                <div class="grid grid-cols-3 gap-2 pt-1">
                    <button id="btn-in" onclick="kirimAbsen('Masuk')" disabled class="bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-xl font-black shadow-[0_0_15px_rgba(37,99,235,0.4)] disabled:opacity-30 transition-all text-xs tracking-wider">MASUK</button>
                    <button id="btn-out" onclick="kirimAbsen('Pulang')" disabled class="bg-slate-700 hover:bg-slate-600 text-white py-3.5 rounded-xl font-black shadow-lg disabled:opacity-30 transition-all text-xs tracking-wider">PULANG</button>
                    <button id="btn-izin" onclick="ajukanIzin()" disabled class="bg-amber-500/20 hover:bg-amber-500 text-amber-500 hover:text-white border border-amber-500/50 py-3.5 rounded-xl font-black shadow-lg disabled:opacity-30 transition-all text-[10px] tracking-wider">IZIN</button>
                </div>
            </div>

            <!-- TAB REGISTRASI -->
            <div id="panel-reg" class="hidden space-y-3">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap Staf Baru" class="w-full p-3.5 glass-input rounded-xl text-xs font-bold outline-none text-center mt-2">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3.5 glass-input rounded-xl text-xs font-bold outline-none text-center"><option value="Staff">Role: Staff</option><option value="Senior">Role: Senior</option></select>
                    <select id="reg-outlet" class="p-3.5 glass-input rounded-xl text-xs font-bold outline-none text-center"><option value="" disabled selected>Penempatan</option></select>
                </div>
                <button onclick="daftarkan()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white py-3.5 rounded-xl font-black shadow-[0_0_15px_rgba(16,185,129,0.4)] mt-2 transition-all text-xs tracking-widest">KUNCI BIOMETRIK WAJAH</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxkOCboooYMfJM2W-1WKVu_dHJbfKHdd28TMuxUVkgSotvkf9TERgTQcnXHXDBixEC6kA/exec"; // <--- UPDATE URL GAS ANDA
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, distance = 0, isLocValid = false, lastRecognizedName = null;
        let isPrompting = false, isLivenessPassed = false;

        window.addEventListener('load', () => {
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    pos => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; document.getElementById('geo-status').innerText = "📍 GPS TERKUNCI"; document.getElementById('geo-status').className = "text-emerald-400 text-[10px] tracking-widest font-bold mt-1"; cekJarak(); },
                    err => { Swal.fire('Info', 'GPS tidak diizinkan. Hanya fitur IZIN yang aktif.', 'info'); }, { enableHighAccuracy: true }
                );
            }
            setTimeout(initApp, 800);
        });

        function hitungJarak(lat1, lon1, lat2Str, lon2Str) {
            const lat2 = parseFloat(lat2Str), lon2 = parseFloat(lon2Str);
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            Swal.fire({ title: 'Please Wait...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            // Tambahan: Memuat Model Ekspresi Wajah (Liveness Detection)
            await Promise.all([ 
                faceapi.nets.tinyFaceDetector.loadFromUri(URL), 
                faceapi.nets.faceLandmark68Net.loadFromUri(URL), 
                faceapi.nets.faceRecognitionNet.loadFromUri(URL),
                faceapi.nets.faceExpressionNet.loadFromUri(URL) 
            ]);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
                const data = await res.json();
                dbOutlet = data.dataOutlet; dbShift = data.dataShift;

                let outHtml = '<option value="" disabled selected>Pilih Outlet</option>';
                dbOutlet.forEach(o => { outHtml += `<option value="${o.nama}">${o.nama}</option>`; });
                document.getElementById('sel-outlet').innerHTML = outHtml; document.getElementById('reg-outlet').innerHTML = outHtml;

                if (data.dataKaryawan.length > 0) {
                    const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role, o: k.outlet}), [new Float32Array(k.descriptor)]));
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.40);
                }
                
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).then(s => { video.srcObject = s; Swal.close(); }).catch(e => Swal.fire('Error', 'Kamera diblokir.', 'error'));
            } catch (e) { Swal.fire('Error', 'Gagal memuat database.', 'error'); }
        }

        function loadShiftDropdown() {
            cekJarak();
            const outletName = document.getElementById('sel-outlet').value;
            const shiftSelect = document.getElementById('sel-shift');
            const shiftTersedia = dbShift.filter(s => s.outlet === outletName);
            
            if(shiftTersedia.length === 0) { shiftSelect.innerHTML = '<option value="" disabled selected>Belum ada jadwal</option>'; } 
            else {
                shiftSelect.innerHTML = '<option value="" disabled selected>Pilih Shift Target</option>';
                shiftTersedia.forEach(s => { shiftSelect.innerHTML += `<option value="${s.kode}" data-jamm="${s.jamMasuk}" data-jamk="${s.jamKeluar}" data-tol="${s.toleransi}">${s.kode} (${s.jamMasuk}-${s.jamKeluar})</option>`; });
            }
        }

        function cariShiftOtomatis(outletName) {
            const shifts = dbShift.filter(s => s.outlet === outletName);
            if (shifts.length === 0) return null;
            
            const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes();
            let bestShift = shifts[0], minDiff = Infinity;

            shifts.forEach(s => {
                const mMasuk = parseInt(s.jamMasuk.split(':')[0]) * 60 + parseInt(s.jamMasuk.split(':')[1]);
                const mKeluar = parseInt(s.jamKeluar.split(':')[0]) * 60 + parseInt(s.jamKeluar.split(':')[1]);
                const closest = Math.min(Math.abs(currentMins - mMasuk), Math.abs(currentMins - mKeluar));
                if(closest < minDiff) { minDiff = closest; bestShift = s; }
            });
            return bestShift;
        }

        function cekJarak() {
            const outName = document.getElementById('sel-outlet').value, alertBox = document.getElementById('dist-alert');
            if(!outName || userLat === 0) return;

            const outlet = dbOutlet.find(o => o.nama === outName);
            if(!outlet) return; distance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            
            if (distance > outlet.radius) { isLocValid = false; alertBox.classList.remove('hidden'); alertBox.innerHTML = `⚠️ Jarak ${Math.round(distance)}m. Maks. ${outlet.radius}m dari Toko!`; } 
            else { isLocValid = true; alertBox.classList.add('hidden'); } updateUI(currentFace !== null);
        }

        video.addEventListener('loadedmetadata', () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; });

        video.addEventListener('play', () => {
            const size = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, size);
            
            setInterval(async () => {
                if(isPrompting) return;

                // Memanggil deteksi ekspresi (Senyum)
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceExpressions().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, size); canvas.getContext('2d').clearRect(0, 0, size.width, size.height);

                if (!document.getElementById('panel-absen').classList.contains('hidden') && detections.length > 0 && faceMatcher) {
                    const match = faceMatcher.findBestMatch(resized[0].descriptor);
                    if (match.label !== 'unknown') {
                        const info = JSON.parse(match.label);
                        
                        // FITUR LIVENESS DETECTION: Wajib Tersenyum!
                        const expressions = resized[0].expressions;
                        if (expressions.happy > 0.6) { // Jika tingkat senyum > 60%, Liveness Lolos
                            isLivenessPassed = true;
                        }

                        if (!isLivenessPassed) {
                            currentFace = info;
                            updateUI(true, "LIVENESS_WAIT");
                            return; // Hentikan eksekusi sampai ia tersenyum
                        }
                        
                        // Jika Lolos Liveness & Wajah Baru Dikenali
                        if(lastRecognizedName !== info.n) { 
                            lastRecognizedName = info.n;
                            currentFace = info; 
                            const outSel = document.getElementById('sel-outlet'); 
                            if(info.o) { outSel.value = info.o; loadShiftDropdown(); } 
                            
                            const autoShift = cariShiftOtomatis(info.o);
                            if(autoShift) {
                                document.getElementById('sel-shift').value = autoShift.kode;
                                updateUI(true);
                                munculkanPopupAutoAbsen(info, autoShift);
                            } else { updateUI(true); }
                        } else { currentFace = info; updateUI(true); }
                    } else { lastRecognizedName = null; isLivenessPassed = false; updateUI(false); }
                } else { lastRecognizedName = null; isLivenessPassed = false; updateUI(false); if (!document.getElementById('panel-reg').classList.contains('hidden')) { faceapi.draw.drawFaceLandmarks(canvas, resized); } }
            }, 800);
        });

        function updateUI(found, state = "READY") {
            const nameEl = document.getElementById('ai-name'), outSel = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift').value;
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out'), btnIzin = document.getElementById('btn-izin');
            const camInstruction = document.getElementById('cam-instruction');
            const hudScanner = document.getElementById('hud-scanner');
            const laser = document.getElementById('laser');
            const icon = document.getElementById('avatar-icon');
            
            if (found && currentFace) {
                if (state === "LIVENESS_WAIT") {
                    nameEl.innerHTML = `${currentFace.n} <br><span class="text-amber-400 text-[10px] uppercase tracking-widest animate-pulse">Menunggu Senyuman...</span>`;
                    nameEl.className = "text-sm font-black text-white"; icon.innerText = "😊";
                    
                    hudScanner.className = "hud-box status-wait"; laser.style.display = "none";
                    camInstruction.innerText = "TERSENYUMLAH KE KAMERA"; camInstruction.className = "bg-amber-500 px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-[0_0_15px_rgba(245,158,11,0.5)]";
                    
                    btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true;
                } else {
                    nameEl.innerHTML = `${currentFace.n}`;
                    nameEl.className = "text-sm font-black text-emerald-400"; icon.innerText = "✅";
                    
                    hudScanner.className = "hud-box status-success"; laser.style.display = "none";
                    camInstruction.innerText = "IDENTITAS DIKUNCI"; camInstruction.className = "bg-emerald-500 px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-[0_0_15px_rgba(16,185,129,0.5)]";
                    
                    if(outSel) btnIzin.disabled = false; else btnIzin.disabled = true;
                    if (isLocValid && shf) { btnIn.disabled = false; btnOut.disabled = false; } else { btnIn.disabled = true; btnOut.disabled = true; }
                }
            } else { 
                nameEl.innerText = "Memindai Biometrik..."; nameEl.className = "text-sm font-black text-slate-400"; icon.innerText = "👤";
                
                hudScanner.className = "hud-box status-search"; laser.style.display = "block";
                camInstruction.innerText = "SEJAJARKAN WAJAH"; camInstruction.className = "bg-slate-900/80 backdrop-blur px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest shadow-lg";
                
                currentFace = null; btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true; 
            }
        }

        document.getElementById('sel-shift').addEventListener('change', () => updateUI(currentFace !== null));

        function munculkanPopupAutoAbsen(faceInfo, shift) {
            isPrompting = true; cekJarak();
            if(!isLocValid) {
                Swal.fire({ icon: 'warning', title: 'Di Luar Radius!', text: 'Sistem mengenali Anda, tapi GPS HP Anda di luar radius toko.', confirmButtonText: 'Tutup' }).then(() => { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; }); return;
            }
            Swal.fire({
                title: `Hai, ${faceInfo.n}! 👋`,
                html: `Anda terdeteksi berada di <b>${faceInfo.o}</b>.<br><br>Shift saat ini:<br><b class="text-xl text-blue-600">${shift.kode} (${shift.jamMasuk} - ${shift.jamKeluar})</b><br><br>Pilih aksi cepat:`,
                showDenyButton: true, showCancelButton: true,
                confirmButtonText: '✅ MASUK', confirmButtonColor: '#2563eb',
                denyButtonText: '🛑 PULANG', denyButtonColor: '#0f172a',
                cancelButtonText: '⚙️ Manual', allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) { kirimAbsen('Masuk'); } 
                else if (result.isDenied) { kirimAbsen('Pulang'); } 
                else { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; } 
            });
        }

        function ambilFotoKamera() {
            const tempCanvas = document.createElement('canvas'); const scale = 480 / video.videoWidth; 
            tempCanvas.width = 480; tempCanvas.height = video.videoHeight * scale;
            const ctx = tempCanvas.getContext('2d'); ctx.translate(tempCanvas.width, 0); ctx.scale(-1, 1); 
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            return tempCanvas.toDataURL('image/jpeg', 0.6);
        }

        async function kirimAbsen(tipe) {
            isPrompting = true; 
            const out = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift');
            const shfM = shf.options[shf.selectedIndex].getAttribute('data-jamm'), shfK = shf.options[shf.selectedIndex].getAttribute('data-jamk'), shfTol = shf.options[shf.selectedIndex].getAttribute('data-tol');
            const fotoData = ambilFotoKamera();

            Swal.fire({ title: 'Merekam Foto & Log...', html: 'Tunggu sebentar...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, namaShift: shf.value, shiftTarget: shfM, shiftKeluar: shfK, toleransi: shfTol, tipe: tipe, jarak: distance, foto: fotoData } }) });
                const result = await res.json();
                
                if (result.status === 'success') {
                    const textWA = `*NOTIFIKASI ABSENSI AIMOY*%0A%0A👤 *Nama:* ${currentFace.n}%0A💼 *Shift:* ${shf.value} (${shfM}-${shfK})%0A🏢 *Lokasi:* ${out}%0A📍 *Tipe:* ${tipe.toUpperCase()}%0A⏰ *Waktu:* ${result.jam}%0A✅ *Status:* ${result.statusWaktu}%0A📸 *Bukti Foto:* ${result.linkFoto}`;
                    const waLink = `https://api.whatsapp.com/send?text=${textWA}`;

                    Swal.fire({
                        icon: 'success', title: 'Absen Berhasil!',
                        html: `<b>${currentFace.n}</b> berhasil ${tipe}.<br>Status: <b class="text-blue-600">${result.statusWaktu}</b><br><br><a href="${waLink}" target="_blank" class="bg-emerald-500 text-white px-4 py-3 rounded-xl font-black shadow-lg block text-center uppercase tracking-widest text-xs hover:bg-emerald-600 transition-all shadow-emerald-500/50">💬 LAPORKAN KE GRUP WA</a>`,
                        showConfirmButton: false, timer: 15000
                    }).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; document.getElementById('sel-shift').value = ""; updateUI(false); });
                } else { Swal.fire('Ditolak Sistem', result.message, 'error').then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
            } catch (e) { Swal.fire('Gagal', 'Gangguan server.', 'error').then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
        }

        async function ajukanIzin() {
            isPrompting = true;
            const out = document.getElementById('sel-outlet').value;
            const { value: alasan } = await Swal.fire({ title: 'Pengajuan Izin', input: 'text', inputLabel: 'Keterangan Izin', showCancelButton: true, inputValidator: (value) => { if (!value) return 'Wajib diisi!' } });
            if (alasan) {
                const fotoData = ambilFotoKamera();
                Swal.fire({ title: 'Merekam Izin & Foto...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, tipe: 'Izin', keterangan: alasan, foto: fotoData } }) });
                    const result = await res.json();
                    if (result.status === 'success') Swal.fire('Terekam!', `Izin <b>${currentFace.n}</b> dicatat.`, 'success').then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; });
                } catch (e) { Swal.fire('Gagal', 'Gangguan server.', 'error').then(() => { isPrompting = false; }); }
            } else { isPrompting = false; }
        }

        async function daftarkan() {
            isPrompting = true;
            const nama = document.getElementById('reg-nama').value, role = document.getElementById('reg-role').value, outlet = document.getElementById('reg-outlet').value;
            if(!nama || !outlet) { isPrompting = false; return Swal.fire('Error', 'Nama dan Outlet wajib diisi!', 'warning'); }

            Swal.fire({ title: 'Menganalisis Biometrik...', text: 'Tahan Posisi Wajah di Dalam Garis', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(!detection) { isPrompting = false; return Swal.fire('Gagal', 'Wajah tidak jelas. Sejajarkan di dalam garis.', 'error'); }

            if (faceMatcher) {
                const match = faceMatcher.findBestMatch(detection.descriptor);
                if (match.label !== 'unknown') {
                    const existData = JSON.parse(match.label);
                    isPrompting = false; return Swal.fire({ icon: 'error', title: 'Registrasi Ditolak', html: `Wajah ini sudah terdaftar atas nama:<br><b class="text-xl text-blue-600">${existData.n}</b><br>di ${existData.o}` });
                }
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'enroll', payload: { nama, role, outlet, descriptor: Array.from(detection.descriptor) } }) });
                const data = await res.json();
                if(data.status === 'success') Swal.fire('Tersimpan!', `Wajah ${nama} dikunci.`, 'success').then(() => location.reload());
            } catch(e) { Swal.fire('Error', 'Gagal menyimpan.', 'error').then(() => { isPrompting = false; }); }
        }

        function switchTab(t) { document.getElementById('panel-absen').classList.toggle('hidden', t === 'reg'); document.getElementById('panel-reg').classList.toggle('hidden', t === 'absen'); document.getElementById('tab-absen').classList.toggle('active', t === 'absen'); document.getElementById('tab-absen').classList.toggle('text-slate-400', t === 'reg'); document.getElementById('tab-reg').classList.toggle('active', t === 'reg'); document.getElementById('tab-reg').classList.toggle('text-slate-400', t === 'absen'); }
    </script>
</body>
