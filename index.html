<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aicha HC - Mesin Outlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #0f172a; font-family: sans-serif; }
        .camera-box { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 1rem; overflow: hidden; border: 4px solid #334155; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #eff6ff; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden flex flex-col">
        <div class="bg-slate-900 p-5 text-center">
            <h1 class="text-white font-black tracking-tighter text-2xl italic">AICHA KIOSK</h1>
            <p id="geo-status" class="text-rose-400 text-[10px] tracking-widest font-bold mt-1">📍 MENCARI GPS...</p>
        </div>

        <div class="flex border-b border-slate-100">
            <button onclick="switchTab('absen')" id="tab-absen" class="tab-btn active flex-1 py-4 text-xs font-black transition-all">ABSENSI</button>
            <button onclick="switchTab('reg')" id="tab-reg" class="tab-btn flex-1 py-4 text-xs font-black text-slate-400 transition-all">REGISTRASI</button>
        </div>

        <div class="p-6 space-y-4">
            <div class="camera-box"><video id="video" autoplay muted playsinline></video><canvas id="overlay"></canvas></div>

            <!-- PANEL ABSENSI -->
            <div id="panel-absen" class="space-y-4">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                    <span class="text-[9px] font-black text-slate-400 uppercase">IDENTITAS AI WAJAH</span>
                    <h2 id="ai-name" class="text-lg font-black text-slate-300 italic">Memindai...</h2>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <select id="sel-outlet" onchange="loadShiftDropdown()" class="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none">
                        <option value="" disabled selected>Pilih Outlet</option>
                    </select>
                    <select id="sel-shift" class="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none">
                        <option value="" disabled selected>Pilih Shift</option>
                    </select>
                </div>
                
                <div id="dist-alert" class="hidden bg-rose-100 text-rose-600 p-2 rounded-xl text-[10px] font-bold text-center"></div>

                <div class="grid grid-cols-3 gap-2 pt-2">
                    <button id="btn-in" onclick="kirimAbsen('Masuk')" disabled class="bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg disabled:opacity-30">MASUK</button>
                    <button id="btn-out" onclick="kirimAbsen('Pulang')" disabled class="bg-slate-900 text-white py-3 rounded-xl font-black shadow-lg disabled:opacity-30">PULANG</button>
                    <!-- Tombol IZIN (Aktif asal wajah dikenali, mengabaikan jarak GPS) -->
                    <button id="btn-izin" onclick="ajukanIzin()" disabled class="bg-amber-500 text-white py-3 rounded-xl font-black shadow-lg disabled:opacity-30">IZIN</button>
                </div>
            </div>

            <!-- PANEL REGISTRASI -->
            <div id="panel-reg" class="hidden space-y-3">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap Staf" class="w-full p-3 border border-slate-200 rounded-xl text-xs font-bold outline-none mt-2">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                        <option value="Staff">Role: Staff</option>
                        <option value="Senior">Role: Senior</option>
                    </select>
                    <select id="reg-outlet" class="p-3 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                        <option value="" disabled selected>Penempatan...</option>
                    </select>
                </div>
                <button onclick="daftarkan()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black shadow-lg mt-2">KUNCI WAJAH</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby9E4RO9QWNrpejJYVVhUpT89320ChH5vwtqoCu4DcnhaRbjFgMOzOdRZM9kd5-kKxP1w/exec"; // <-- JANGAN LUPA UPDATE URL INI
        
        const video = document.getElementById('video');
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, distance = 0, isLocValid = false;

        window.addEventListener('load', () => {
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    pos => { 
                        userLat = pos.coords.latitude; userLng = pos.coords.longitude; 
                        document.getElementById('geo-status').innerText = "📍 GPS TERKUNCI"; 
                        document.getElementById('geo-status').className = "text-emerald-400 text-[10px] tracking-widest font-bold mt-1"; 
                        cekJarak(); 
                    },
                    err => { Swal.fire('Info', 'GPS tidak diizinkan. Anda hanya bisa menggunakan fitur IZIN/SAKIT.', 'info'); }, { enableHighAccuracy: true }
                );
            }
            setTimeout(initApp, 800);
        });

        function hitungJarak(lat1, lon1, lat2Str, lon2Str) {
            const lat2 = parseFloat(lat2Str), lon2 = parseFloat(lon2Str);
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            Swal.fire({ title: 'Sinkronisasi...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await Promise.all([ faceapi.nets.tinyFaceDetector.loadFromUri(URL), faceapi.nets.faceLandmark68Net.loadFromUri(URL), faceapi.nets.faceRecognitionNet.loadFromUri(URL) ]);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
                const data = await res.json();
                dbOutlet = data.dataOutlet; dbShift = data.dataShift;

                let outHtml = '<option value="" disabled selected>Pilih Outlet</option>';
                dbOutlet.forEach(o => { outHtml += `<option value="${o.nama}">${o.nama}</option>`; });
                document.getElementById('sel-outlet').innerHTML = outHtml;
                document.getElementById('reg-outlet').innerHTML = outHtml;

                if (data.dataKaryawan.length > 0) {
                    const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role}), [new Float32Array(k.descriptor)]));
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.40);
                }
                
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }).then(s => { video.srcObject = s; Swal.close(); }).catch(e => Swal.fire('Error', 'Kamera diblokir.', 'error'));
            } catch (e) { Swal.fire('Error', 'Gagal memuat database.', 'error'); }
        }

        function loadShiftDropdown() {
            cekJarak();
            const outletName = document.getElementById('sel-outlet').value;
            const shiftSelect = document.getElementById('sel-shift');
            const shiftTersedia = dbShift.filter(s => s.outlet === outletName);
            
            if(shiftTersedia.length === 0) {
                shiftSelect.innerHTML = '<option value="" disabled selected>Belum ada jadwal</option>';
            } else {
                shiftSelect.innerHTML = '<option value="" disabled selected>Pilih Shift Target</option>';
                shiftTersedia.forEach(s => { shiftSelect.innerHTML += `<option value="${s.kode}" data-jam="${s.jamMasuk}" data-tol="${s.toleransi}">${s.kode} (${s.jamMasuk})</option>`; });
            }
        }

        function cekJarak() {
            const outName = document.getElementById('sel-outlet').value;
            const alertBox = document.getElementById('dist-alert');
            if(!outName || userLat === 0) return;

            const outlet = dbOutlet.find(o => o.nama === outName);
            distance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            
            if (distance > outlet.radius) {
                isLocValid = false; alertBox.classList.remove('hidden');
                alertBox.innerHTML = `⚠️ Jarak ${Math.round(distance)}m. Maks. ${outlet.radius}m dari Toko!`;
            } else {
                isLocValid = true; alertBox.classList.add('hidden');
            }
            updateUI(currentFace !== null);
        }

        video.addEventListener('play', () => {
            const canvas = document.getElementById('overlay');
            const size = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, size);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, size);
                canvas.getContext('2d').clearRect(0, 0, size.width, size.height);

                if (!document.getElementById('panel-absen').classList.contains('hidden') && detections.length > 0 && faceMatcher) {
                    const match = faceMatcher.findBestMatch(resized[0].descriptor);
                    if (match.label !== 'unknown') {
                        currentFace = JSON.parse(match.label); updateUI(true);
                    } else { updateUI(false); }
                } else { 
                    updateUI(false); 
                    if (!document.getElementById('panel-reg').classList.contains('hidden')) { faceapi.draw.drawFaceLandmarks(canvas, resized); }
                }
            }, 800);
        });

        function updateUI(found) {
            const nameEl = document.getElementById('ai-name'), outSel = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift').value;
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out'), btnIzin = document.getElementById('btn-izin');
            
            if (found && currentFace) {
                nameEl.innerText = currentFace.n; nameEl.className = "text-lg font-black text-blue-600";
                
                // Izin hanya butuh identitas dan outlet (tidak butuh shift/GPS)
                if(outSel) btnIzin.disabled = false; else btnIzin.disabled = true;
                
                // Absen Normal (Butuh GPS & Shift)
                if (isLocValid && shf) { btnIn.disabled = false; btnOut.disabled = false; } 
                else { btnIn.disabled = true; btnOut.disabled = true; }
            } else {
                nameEl.innerText = "Memindai..."; nameEl.className = "text-lg font-black text-slate-300 italic";
                currentFace = null; btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true;
            }
        }

        document.getElementById('sel-shift').addEventListener('change', () => updateUI(currentFace !== null));

        async function kirimAbsen(tipe) {
            const out = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift');
            const shfT = shf.options[shf.selectedIndex].getAttribute('data-jam');
            const shfTol = shf.options[shf.selectedIndex].getAttribute('data-tol');
            
            Swal.fire({ title: 'Merekam Log...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, namaShift: shf.value, shiftTarget: shfT, toleransi: shfTol, tipe: tipe, jarak: distance } }) });
                const result = await res.json();
                if (result.status === 'success') {
                    Swal.fire('Sukses!', `<b>${currentFace.n}</b> absen ${tipe}.<br>Status: ${result.statusWaktu}`, 'success');
                    document.getElementById('sel-shift').value = ""; updateUI(false);
                }
            } catch (e) { Swal.fire('Gagal', 'Gangguan server.', 'error'); }
        }

        // FUNGSI IZIN / SAKIT (TIDAK BUTUH GPS)
        async function ajukanIzin() {
            const out = document.getElementById('sel-outlet').value;
            const { value: alasan } = await Swal.fire({
                title: 'Pengajuan Izin',
                input: 'text',
                inputLabel: 'Keterangan Izin (Misal: Sakit Demam, Urusan Keluarga)',
                inputPlaceholder: 'Masukkan keterangan...',
                showCancelButton: true,
                inputValidator: (value) => { if (!value) return 'Keterangan wajib diisi!' }
            });

            if (alasan) {
                Swal.fire({ title: 'Merekam Izin...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, tipe: 'Izin', keterangan: alasan } }) });
                    const result = await res.json();
                    if (result.status === 'success') Swal.fire('Terekam!', `Izin <b>${currentFace.n}</b> berhasil dicatat.`, 'success');
                } catch (e) { Swal.fire('Gagal', 'Gangguan server.', 'error'); }
            }
        }

        async function daftarkan() {
            const nama = document.getElementById('reg-nama').value, role = document.getElementById('reg-role').value, outlet = document.getElementById('reg-outlet').value;
            if(!nama || !outlet) return Swal.fire('Error', 'Nama dan Outlet wajib diisi!', 'warning');

            Swal.fire({ title: 'Kunci Biometrik...', text: 'Tahan Posisi Wajah', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if(!detection) return Swal.fire('Gagal', 'Wajah tidak jelas. Terangkan cahaya.', 'error');
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'enroll', payload: { nama, role, outlet, descriptor: Array.from(detection.descriptor) } }) });
                const data = await res.json();
                if(data.status === 'success') Swal.fire('Tersimpan!', `Wajah ${nama} berhasil dikunci.`, 'success').then(() => location.reload());
            } catch(e) { Swal.fire('Error', 'Gagal menyimpan.', 'error'); }
        }

        function switchTab(t) {
            document.getElementById('panel-absen').classList.toggle('hidden', t === 'reg');
            document.getElementById('panel-reg').classList.toggle('hidden', t === 'absen');
            document.getElementById('tab-absen').classList.toggle('active', t === 'absen');
            document.getElementById('tab-absen').classList.toggle('text-slate-400', t === 'reg');
            document.getElementById('tab-reg').classList.toggle('active', t === 'reg');
            document.getElementById('tab-reg').classList.toggle('text-slate-400', t === 'absen');
        }
    </script>
</body>
</html>
