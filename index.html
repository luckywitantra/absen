<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiMoy Smart Kiosk</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background: #0f172a; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .camera-container { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; z-index: 0; overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        /* Canvas hanya dipakai untuk logika internal, tidak ditampilkan untuk menghindari garis melenceng */
        #overlay { display: none; } 

        /* TEMA MATTE DARK / NEUMORPHISM */
        .matte-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .matte-input { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.3s; }
        .matte-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); outline: none; }
        
        /* TRACKING BOX GAYA FACE-ID (MELAYANG MENGIKUTI WAJAH) */
        #tracking-box {
            position: absolute; border-radius: 1rem; z-index: 30; pointer-events: none;
            transition: all 0.1s ease-out; opacity: 0;
            box-shadow: 0 0 0 4000px rgba(15, 23, 42, 0.6); /* Efek vignette fokus ke wajah */
        }
        
        /* Sudut Kamera (Viewfinder) */
        .corner { position: absolute; width: 25px; height: 25px; border-color: #fff; border-style: solid; transition: border-color 0.3s; }
        .corner-tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 1rem; }
        .corner-tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 1rem; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 1rem; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 1rem; }

        @keyframes scan-laser { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .laser-line { position: absolute; width: 100%; height: 2px; background: #3b82f6; box-shadow: 0 0 10px 2px #3b82f6; animation: scan-laser 2s infinite linear; }

        /* Status Warna Tracking Box */
        .track-search .corner { border-color: #3b82f6; } /* Biru */
        .track-liveness .corner { border-color: #f59e0b; } /* Kuning/Amber */
        .track-success .corner { border-color: #10b981; } /* Hijau */
        .track-error .corner { border-color: #f43f5e; } /* Merah */

        /* Loader Kustom */
        #loader-screen { transition: opacity 0.4s ease; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        select option { background: #0f172a; color: white; padding: 10px; }
        div:where(.swal2-container) .swal2-popup { border-radius: 24px; border: 1px solid #334155; background: #0f172a !important; color: white; }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center text-white select-none antialiased">

    <div id="loader-screen" class="absolute inset-0 z-50 bg-[#0f172a] flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <h2 class="text-lg font-black tracking-widest text-blue-400">MENYIAPKAN MESIN...</h2>
        <p id="loader-text" class="text-xs text-slate-400 font-bold mt-2">Membaca memori lokal</p>
    </div>

    <div class="relative w-full max-w-md mx-auto h-full sm:h-[95vh] sm:rounded-[2rem] overflow-hidden shadow-2xl bg-[#0f172a] flex flex-col">
        
        <div class="camera-container" id="cam-container">
            <video id="video" autoplay muted playsinline></video>
            
            <div id="tracking-box" class="track-search">
                <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div><div class="corner corner-br"></div>
                <div class="laser-line" id="laser"></div>
            </div>
        </div>

        <div class="relative z-40 flex justify-between items-start p-5 bg-gradient-to-b from-slate-900/90 to-transparent">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-white">AiMoy</h1>
                <div class="flex items-center gap-2 mt-1">
                    <button onclick="forceRefreshGPS()" class="bg-slate-800 p-1.5 rounded-full hover:bg-slate-700 transition" title="Refresh GPS">
                        <svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    <span id="geo-status" class="text-rose-400 text-[10px] tracking-widest font-bold flex items-center gap-1.5">
                        <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span></span>
                        MENCARI GPS...
                    </span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="syncDataManual()" class="bg-slate-800 p-2 rounded-full hover:bg-slate-700 transition shadow-lg" title="Tarik Data Karyawan Baru">
                    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                </button>
                <button onclick="toggleFullScreen()" class="bg-slate-800 p-2 rounded-full hover:bg-slate-700 transition shadow-lg">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
            </div>
        </div>

        <div class="relative z-40 flex flex-col items-center mt-2 pointer-events-none drop-shadow-md">
            <div id="real-time-clock" class="text-5xl font-black tracking-tighter text-white">00:00</div>
            <div id="real-time-date" class="text-[10px] font-bold text-slate-300 tracking-widest uppercase mt-1 bg-slate-900/60 px-3 py-1 rounded-full border border-slate-700">Waktu...</div>
        </div>

        <div class="absolute inset-0 z-30 flex flex-col items-center justify-center pointer-events-none">
            <div id="cam-instruction" class="mt-[280px] bg-slate-800/80 px-5 py-2 rounded-full text-white text-[10px] font-black tracking-widest transition-all">
                Pindai Wajah...
            </div>
        </div>

        <div class="relative z-40 mt-auto w-full matte-panel pt-5 px-5 pb-6 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
            
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                    <span id="avatar-icon" class="text-lg">👤</span>
                </div>
                <div class="flex-1 overflow-hidden">
                    <h2 id="ai-name" class="text-sm font-black text-white truncate">Wajah Belum Dikenali</h2>
                    <p id="ai-status" class="text-[10px] font-bold text-slate-400 truncate">Menunggu pemindaian biometrik</p>
                </div>
            </div>

            <div id="dist-alert" class="hidden mb-3 bg-rose-500/10 border border-rose-500/30 text-rose-400 p-2 rounded-lg text-[10px] font-bold text-center"></div>

            <div id="panel-absen" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <select id="sel-outlet" onchange="loadShiftDropdown()" class="w-full p-3 matte-input rounded-lg text-xs font-bold text-center appearance-none"><option value="" disabled selected>Pilih Outlet</option></select>
                    <select id="sel-shift" class="w-full p-3 matte-input rounded-lg text-xs font-bold text-center appearance-none"><option value="" disabled selected>Pilih Shift</option></select>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-in" onclick="kirimAbsen('Masuk')" disabled class="bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-lg font-black disabled:opacity-30 disabled:bg-slate-800 transition-all text-xs tracking-widest">MASUK</button>
                    <button id="btn-out" onclick="kirimAbsen('Pulang')" disabled class="bg-slate-700 hover:bg-slate-600 text-white py-3.5 rounded-lg font-black disabled:opacity-30 disabled:bg-slate-800 transition-all text-xs tracking-widest">PULANG</button>
                </div>
                <button id="btn-izin" onclick="ajukanIzin()" disabled class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 py-3 rounded-lg font-bold disabled:opacity-30 transition-all text-[10px] tracking-widest uppercase">Ajukan Izin / Sakit</button>
            </div>

            <div id="panel-reg" class="hidden space-y-3">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap Staf Baru" class="w-full p-3 matte-input rounded-lg text-xs font-bold text-center">
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-role" class="p-3 matte-input rounded-lg text-xs font-bold text-center"><option value="Staff">Staff</option><option value="Senior">Senior</option></select>
                    <select id="reg-outlet" class="p-3 matte-input rounded-lg text-xs font-bold text-center"><option value="" disabled selected>Penempatan</option></select>
                </div>
                <button onclick="daftarkan()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-lg font-black transition-all text-xs tracking-widest">KUNCI BIOMETRIK</button>
            </div>

            <div class="flex justify-center gap-8 mt-4 pt-4 border-t border-slate-800 text-[9px] font-black tracking-widest uppercase">
                <span id="tab-absen" onclick="switchTab('absen')" class="cursor-pointer text-blue-400">Absensi</span>
                <span id="tab-reg" onclick="switchTab('reg')" class="cursor-pointer text-slate-500 hover:text-white">Registrasi Baru</span>
            </div>
        </div>
    </div>

    <div id="install-prompt" class="fixed bottom-0 left-0 right-0 z-50 p-4 transform translate-y-full transition-transform duration-500">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl p-5 shadow-2xl flex flex-col items-center text-center">
            <h3 class="text-white font-black text-base">Install AiMoy Kiosk</h3>
            <p id="install-instruction" class="text-slate-300 text-[10px] font-medium mt-1 mb-4 leading-relaxed">
                Tambahkan ke Layar Utama HP Anda untuk kecepatan & stabilitas maksimal.
            </p>
            <div class="flex gap-2 w-full">
                <button onclick="closeInstallPrompt()" class="flex-1 py-2.5 rounded-lg bg-slate-700 text-white font-bold text-xs">Nanti</button>
                <button id="btn-install" class="flex-1 py-2.5 rounded-lg bg-blue-600 text-white font-black text-xs">INSTALL</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxkOCboooYMfJM2W-1WKVu_dHJbfKHdd28TMuxUVkgSotvkf9TERgTQcnXHXDBixEC6kA/exec"; // <--- UPDATE URL GAS
        
        // PWA INSTALL LOGIC
        let deferredPrompt; const installPopup = document.getElementById('install-prompt'), btnInstall = document.getElementById('btn-install'), instructionText = document.getElementById('install-instruction');
        const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone) || window.matchMedia('(display-mode: standalone)').matches;

        if (!isInStandaloneMode()) {
            if (isIos()) { instructionText.innerHTML = `Tekan tombol <b>Share (Bagikan)</b> di bawah, lalu pilih<br><b>"Tambahkan ke Layar Utama"</b>.`; btnInstall.style.display = 'none'; setTimeout(() => installPopup.classList.remove('translate-y-full'), 3000); } 
            else { window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; setTimeout(() => installPopup.classList.remove('translate-y-full'), 3000); }); btnInstall.addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') closeInstallPrompt(); deferredPrompt = null; } }); }
        }
        function closeInstallPrompt() { installPopup.classList.add('translate-y-full'); }

        const video = document.getElementById('video'), trackingBox = document.getElementById('tracking-box');
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, distance = 0, isLocValid = false, lastRecognizedName = null;
        let isPrompting = false, isLivenessPassed = false;

        setInterval(() => {
            const now = new Date(); document.getElementById('real-time-clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace(/\./g, ':'); document.getElementById('real-time-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);

        function toggleFullScreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => {}); } else { if (document.exitFullscreen) document.exitFullscreen(); } }

        function forceRefreshGPS() {
            document.getElementById('geo-status').innerHTML = `<span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span><span class="text-blue-400">MENYEGARKAN GPS...</span>`;
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude; userLng = pos.coords.longitude; document.getElementById('geo-status').innerHTML = `<span class="relative flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500 shadow-[0_0_10px_#10b981]"></span></span><span class="text-emerald-400">AKURAT</span>`; cekJarak();
            }, err => { Swal.fire({title:'GPS Gagal', text:'Pastikan izin lokasi HP aktif', background:'#0f172a', color:'#fff', icon:'warning'}); }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
        }

        window.addEventListener('load', () => { 
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
            forceRefreshGPS(); setTimeout(initApp, 500); 
        });

        // TAHAP 1: FITUR CACHING MASTER DATA LOKAL
        async function fetchMasterData(force = false) {
            const cached = localStorage.getItem('aimoy_master_data');
            const cacheTime = localStorage.getItem('aimoy_cache_time');
            const now = new Date().getTime();

            if (!force && cached && cacheTime && (now - cacheTime < 43200000)) { // Valid 12 Jam
                document.getElementById('loader-text').innerText = "Memuat data offline...";
                return JSON.parse(cached);
            }

            document.getElementById('loader-text').innerText = "Sinkronisasi server...";
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
            const data = await res.json();
            localStorage.setItem('aimoy_master_data', JSON.stringify(data));
            localStorage.setItem('aimoy_cache_time', now.toString());
            return data;
        }

        async function syncDataManual() {
            Swal.fire({ title: 'Menarik Data Baru...', allowOutsideClick: false, background: '#0f172a', didOpen: () => Swal.showLoading() });
            try {
                const data = await fetchMasterData(true);
                setupDropdownsAndMatcher(data);
                Swal.fire({icon: 'success', title: 'Sinkronisasi Selesai', background: '#0f172a', timer: 1500, showConfirmButton: false});
            } catch(e) { Swal.fire({icon: 'error', title: 'Gagal', background: '#0f172a'}); }
        }

        function setupDropdownsAndMatcher(data) {
            dbOutlet = data.dataOutlet; dbShift = data.dataShift;
            let outHtml = '<option value="" disabled selected>Pilih Penempatan</option>';
            dbOutlet.forEach(o => { outHtml += `<option value="${o.nama}">${o.nama}</option>`; });
            document.getElementById('sel-outlet').innerHTML = outHtml; document.getElementById('reg-outlet').innerHTML = outHtml;

            if (data.dataKaryawan.length > 0) {
                const labeled = data.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role, o: k.outlet}), [new Float32Array(k.descriptor)]));
                faceMatcher = new faceapi.FaceMatcher(labeled, 0.40);
            }
        }

        function hitungJarak(lat1, lon1, lat2Str, lon2Str) { const lat2 = parseFloat(lat2Str), lon2 = parseFloat(lon2Str); const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180, Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180; const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2); return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }

        async function initApp() {
            const URL = './models'; 
            try {
                document.getElementById('loader-text').innerText = "Mengaktifkan AI...";
                await Promise.all([ faceapi.nets.tinyFaceDetector.loadFromUri(URL), faceapi.nets.faceLandmark68Net.loadFromUri(URL), faceapi.nets.faceRecognitionNet.loadFromUri(URL) ]);
                
                const data = await fetchMasterData();
                setupDropdownsAndMatcher(data);
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: {ideal: 720} } });
                video.srcObject = stream;
                
                const loader = document.getElementById('loader-screen');
                loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 400);

                faceapi.nets.faceExpressionNet.loadFromUri(URL); // Lazy Load
            } catch (e) { document.getElementById('loader-screen').innerHTML = `<div class="p-6 text-center"><h2 class="text-rose-500 font-black mb-2">SISTEM GAGAL</h2><p class="text-slate-400 text-xs">Pastikan folder <b>models</b> sudah didownload dan internet aktif saat sinkronisasi awal.</p></div>`; }
        }

        function loadShiftDropdown() {
            cekJarak(); const outletName = document.getElementById('sel-outlet').value, shiftSelect = document.getElementById('sel-shift'); const shiftTersedia = dbShift.filter(s => s.outlet === outletName);
            if(shiftTersedia.length === 0) { shiftSelect.innerHTML = '<option value="" disabled selected>Jadwal Kosong</option>'; } 
            else { shiftSelect.innerHTML = '<option value="" disabled selected>Pilih Shift</option>'; shiftTersedia.forEach(s => { shiftSelect.innerHTML += `<option value="${s.kode}" data-jamm="${s.jamMasuk}" data-jamk="${s.jamKeluar}" data-tol="${s.toleransi}">${s.kode} (${s.jamMasuk})</option>`; }); }
        }

        function cariShiftOtomatis(outletName) {
            const shifts = dbShift.filter(s => s.outlet === outletName); if (shifts.length === 0) return null;
            const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes(); let bestShift = shifts[0], minDiff = Infinity;
            shifts.forEach(s => { const mMasuk = parseInt(s.jamMasuk.split(':')[0]) * 60 + parseInt(s.jamMasuk.split(':')[1]); const mKeluar = parseInt(s.jamKeluar.split(':')[0]) * 60 + parseInt(s.jamKeluar.split(':')[1]); const closest = Math.min(Math.abs(currentMins - mMasuk), Math.abs(currentMins - mKeluar)); if(closest < minDiff) { minDiff = closest; bestShift = s; } });
            return bestShift;
        }

        function cekJarak() {
            const outName = document.getElementById('sel-outlet').value, alertBox = document.getElementById('dist-alert');
            if(!outName || userLat === 0) return; const outlet = dbOutlet.find(o => o.nama === outName); if(!outlet) return; distance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            if (distance > outlet.radius) { isLocValid = false; alertBox.classList.remove('hidden'); alertBox.innerHTML = `⚠️ Jauh dari Toko (${Math.round(distance)}m)`; updateUI(currentFace !== null, "ERROR"); } 
            else { isLocValid = true; alertBox.classList.add('hidden'); updateUI(currentFace !== null, isLivenessPassed ? "READY" : "LIVENESS_WAIT"); }
        }

        video.addEventListener('loadedmetadata', () => { 
            // Setting ukuran kanvas internal
            const camContainer = document.getElementById('cam-container');
        });

        video.addEventListener('play', () => {
            setInterval(async () => {
                if(isPrompting) return;
                
                // Gunakan container display untuk skala rasio yang tepat di HP
                const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })).withFaceLandmarks().withFaceExpressions().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, { width: video.videoWidth, height: video.videoHeight }); // Ukuran asli video

                if (!document.getElementById('panel-absen').classList.contains('hidden') && detections.length > 0 && faceMatcher) {
                    
                    // MENGGERAKKAN TRACKING BOX HUD
                    const boxData = resized[0].detection.box;
                    const scaleX = displaySize.width / video.videoWidth;
                    const scaleY = displaySize.height / video.videoHeight;
                    
                    // Kalkulasi posisi X untuk efek cermin (scaleX -1)
                    const mirroedX = video.videoWidth - boxData.x - boxData.width;

                    trackingBox.style.opacity = '1';
                    trackingBox.style.width = (boxData.width * scaleX * 1.2) + 'px';
                    trackingBox.style.height = (boxData.height * scaleY * 1.3) + 'px';
                    trackingBox.style.left = (mirroedX * scaleX - (boxData.width * scaleX * 0.1)) + 'px';
                    trackingBox.style.top = (boxData.y * scaleY - (boxData.height * scaleY * 0.15)) + 'px';

                    const match = faceMatcher.findBestMatch(resized[0].descriptor);
                    if (match.label !== 'unknown') {
                        const info = JSON.parse(match.label);
                        const expressions = resized[0].expressions;
                        if (expressions && expressions.happy > 0.35) { isLivenessPassed = true; }

                        if (!isLivenessPassed) { currentFace = info; updateUI(true, "LIVENESS_WAIT"); return; }
                        
                        if(lastRecognizedName !== info.n) { 
                            lastRecognizedName = info.n; currentFace = info; const outSel = document.getElementById('sel-outlet'); if(info.o) { outSel.value = info.o; loadShiftDropdown(); } 
                            const autoShift = cariShiftOtomatis(info.o);
                            if(autoShift) { document.getElementById('sel-shift').value = autoShift.kode; updateUI(true, isLocValid ? "READY" : "ERROR"); munculkanPopupAutoAbsen(info, autoShift); } 
                            else { updateUI(true, isLocValid ? "READY" : "ERROR"); }
                        } else { currentFace = info; updateUI(true, isLocValid ? "READY" : "ERROR"); }
                    } else { lastRecognizedName = null; isLivenessPassed = false; updateUI(false); }
                } else { 
                    trackingBox.style.opacity = '0'; lastRecognizedName = null; isLivenessPassed = false; updateUI(false); 
                }
            }, 500); 
        });

        function updateUI(found, state = "SEARCHING") {
            const camInst = document.getElementById('cam-instruction'), nameEl = document.getElementById('ai-name'), statusEl = document.getElementById('ai-status');
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out'), btnIzin = document.getElementById('btn-izin');
            const outSel = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift').value;
            const icon = document.getElementById('avatar-icon');
            
            if (found && currentFace) {
                nameEl.innerText = currentFace.n;

                if (state === "LIVENESS_WAIT") {
                    trackingBox.className = "track-liveness"; document.getElementById('laser').style.display = "none";
                    camInst.innerText = "TERSENYUMLAH"; camInst.className = "absolute top-10 bg-amber-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                    statusEl.innerText = "Menunggu senyuman..."; statusEl.className = "text-[10px] font-bold text-amber-400"; icon.innerText = "😊";
                    btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true;
                } else if (state === "ERROR") {
                    trackingBox.className = "track-error"; document.getElementById('laser').style.display = "none";
                    camInst.innerText = "DI LUAR AREA"; camInst.className = "absolute top-10 bg-rose-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                    statusEl.innerText = "Kembali ke area Outlet!"; statusEl.className = "text-[10px] font-bold text-rose-400"; icon.innerText = "📍";
                    btnIn.disabled = true; btnOut.disabled = true; if(outSel) btnIzin.disabled = false;
                } else {
                    trackingBox.className = "track-success"; document.getElementById('laser').style.display = "none";
                    camInst.innerText = "SIAP ABSEN"; camInst.className = "absolute top-10 bg-emerald-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                    statusEl.innerText = shf ? `Shift Target: ${shf}` : "Pilih Shift Anda"; statusEl.className = "text-[10px] font-bold text-emerald-400"; icon.innerText = "✅";
                    if(outSel) btnIzin.disabled = false; else btnIzin.disabled = true;
                    if (isLocValid && shf) { btnIn.disabled = false; btnOut.disabled = false; } else { btnIn.disabled = true; btnOut.disabled = true; }
                }
            } else { 
                trackingBox.className = "track-search"; document.getElementById('laser').style.display = "block";
                camInst.innerText = "Pindai Wajah..."; camInst.className = "absolute top-10 bg-slate-800/80 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest";
                nameEl.innerText = "Wajah Belum Dikenali"; statusEl.innerText = "Menunggu biometrik"; statusEl.className = "text-[10px] font-bold text-slate-400"; icon.innerText = "👤";
                currentFace = null; btnIn.disabled = true; btnOut.disabled = true; btnIzin.disabled = true; 
            }
        }

        document.getElementById('sel-shift').addEventListener('change', () => updateUI(currentFace !== null, isLocValid ? "READY" : "ERROR"));

        function munculkanPopupAutoAbsen(faceInfo, shift) {
            isPrompting = true; cekJarak();
            if(!isLocValid) { Swal.fire({ icon: 'warning', title: 'GPS Meleset', text: 'GPS HP Anda jauh dari toko.', confirmButtonText: 'Tutup', background: '#0f172a', color: '#fff' }).then(() => { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; }); return; }
            Swal.fire({
                title: `<span class="text-blue-400 text-xl font-black">Halo, ${faceInfo.n}!</span>`,
                html: `<div class="text-slate-300 text-xs">Penempatan: <b class="text-white">${faceInfo.o}</b><br><br>Target Shift:<br><div class="bg-[#1e293b] rounded-lg py-2 mt-2 font-black text-lg text-emerald-400 border border-slate-700">${shift.kode} <span class="text-[9px] uppercase font-bold text-slate-400 block">${shift.jamMasuk} - ${shift.jamKeluar}</span></div></div>`,
                showDenyButton: true, showCancelButton: true, background: '#0f172a', color: '#fff',
                confirmButtonText: 'MASUK', confirmButtonColor: '#2563eb', denyButtonText: 'PULANG', denyButtonColor: '#334155', cancelButtonText: 'Manual', allowOutsideClick: false,
                customClass: { popup: 'rounded-3xl border border-slate-700', confirmButton: 'rounded-lg font-black w-full mb-2 text-xs', denyButton: 'rounded-lg font-black w-full mb-2 text-xs', cancelButton: 'rounded-lg w-full text-xs bg-slate-800', actions: 'flex-col w-full px-4' }
            }).then((result) => { if (result.isConfirmed) { kirimAbsen('Masuk'); } else if (result.isDenied) { kirimAbsen('Pulang'); } else { isPrompting = false; isLivenessPassed = false; lastRecognizedName = null; } });
        }

        // TAHAP 2: FITUR KOMPRESI GAMBAR EKSTREM (MICRO-PAYLOAD)
        function ambilFotoKamera() { 
            const tempCanvas = document.createElement('canvas'); 
            const MAX_WIDTH = 320; // Resolusi diturunkan drastis untuk kecepatan
            const scale = MAX_WIDTH / video.videoWidth; 
            tempCanvas.width = MAX_WIDTH; tempCanvas.height = video.videoHeight * scale; 
            const ctx = tempCanvas.getContext('2d'); 
            ctx.translate(tempCanvas.width, 0); ctx.scale(-1, 1); 
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height); 
            return tempCanvas.toDataURL('image/jpeg', 0.4); // Kualitas 40% (Ukuran file jadi hanya ~20KB)
        }

        async function kirimAbsen(tipe) {
            isPrompting = true; const out = document.getElementById('sel-outlet').value, shf = document.getElementById('sel-shift'); const shfM = shf.options[shf.selectedIndex].getAttribute('data-jamm'), shfK = shf.options[shf.selectedIndex].getAttribute('data-jamk'), shfTol = shf.options[shf.selectedIndex].getAttribute('data-tol'); const fotoData = ambilFotoKamera();

            Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading(), customClass:{popup:'rounded-3xl'} });
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, namaShift: shf.value, shiftTarget: shfM, shiftKeluar: shfK, toleransi: shfTol, tipe: tipe, jarak: distance, foto: fotoData } }) });
                const result = await res.json();
                
                if (result.status === 'success') {
                    const textWA = `*NOTIFIKASI ABSENSI*%0A%0A👤 *Nama:* ${currentFace.n}%0A💼 *Shift:* ${shf.value} (${shfM})%0A🏢 *Lokasi:* ${out}%0A📍 *Tipe:* ${tipe.toUpperCase()}%0A⏰ *Waktu:* ${result.jam}%0A✅ *Status:* ${result.statusWaktu}`;
                    const waLink = `https://api.whatsapp.com/send?text=${textWA}`;

                    Swal.fire({ icon: 'success', title: 'Berhasil', background: '#0f172a', color: '#fff', html: `<div class="text-xs text-slate-300">Status: <b class="text-emerald-400">${result.statusWaktu}</b></div><br><a href="${waLink}" target="_blank" class="mt-2 bg-emerald-600 text-white px-4 py-3 rounded-lg font-black block text-center text-xs">💬 Lapor ke Grup WA</a>`, showConfirmButton: false, timer: 10000, customClass: { popup: 'rounded-3xl' } }).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; document.getElementById('sel-shift').value = ""; updateUI(false); });
                } else { Swal.fire({title: 'Ditolak', text: result.message, icon: 'error', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
            } catch (e) { Swal.fire({title: 'Offline', text: 'Gagal menghubungi server.', icon: 'error', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; }); }
        }

        async function ajukanIzin() {
            isPrompting = true; const out = document.getElementById('sel-outlet').value;
            const { value: alasan } = await Swal.fire({ title: 'Izin / Sakit', input: 'text', inputLabel: 'Alasan:', showCancelButton: true, background: '#0f172a', color: '#fff', inputValidator: (value) => { if (!value) return 'Wajib diisi!' }, customClass: { popup: 'rounded-3xl', input: 'matte-input text-white rounded-lg', confirmButton: 'bg-amber-500 rounded-lg font-black', cancelButton: 'rounded-lg bg-slate-800' } });
            if (alasan) {
                const fotoData = ambilFotoKamera();
                Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'absen', payload: { nama: currentFace.n, role: currentFace.r, outlet: out, tipe: 'Izin', keterangan: alasan, foto: fotoData } }) });
                    const result = await res.json();
                    if (result.status === 'success') Swal.fire({title: 'Sukses', text: `Izin diserahkan.`, icon: 'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' }}).then(() => { isPrompting = false; lastRecognizedName = null; isLivenessPassed = false; });
                } catch (e) { Swal.fire({title:'Gagal', text:'Server Sibuk', icon:'error', background:'#0f172a', color:'#fff', customClass:{popup:'rounded-3xl'}}).then(() => { isPrompting = false; }); }
            } else { isPrompting = false; }
        }

        async function daftarkan() {
            isPrompting = true; const nama = document.getElementById('reg-nama').value, role = document.getElementById('reg-role').value, outlet = document.getElementById('reg-outlet').value;
            if(!nama || !outlet) { isPrompting = false; return Swal.fire({title:'Peringatan', text:'Data tidak lengkap', icon:'warning', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}); }

            Swal.fire({ title: 'Analisis Biometrik', text: 'Jangan bergerak...', allowOutsideClick: false, background: '#0f172a', color: '#fff', didOpen: () => Swal.showLoading(), customClass:{popup:'rounded-3xl'} });
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })).withFaceLandmarks().withFaceDescriptor();
            
            if(!detection) { isPrompting = false; return Swal.fire({title:'Gagal', text:'Wajah kabur.', icon:'error', background: '#0f172a', color: '#fff', customClass:{popup:'rounded-3xl'}}); }

            if (faceMatcher) {
                const match = faceMatcher.findBestMatch(detection.descriptor);
                if (match.label !== 'unknown') {
                    const existData = JSON.parse(match.label); isPrompting = false; return Swal.fire({ icon: 'error', title: 'Ditolak', html: `Wajah ini milik:<br><b class="text-rose-400 mt-2 block">${existData.n}</b>`, background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' } });
                }
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'enroll', payload: { nama, role, outlet, descriptor: Array.from(detection.descriptor) } }) });
                const data = await res.json();
                if(data.status === 'success') Swal.fire({title:'Terkunci!', text:`Identitas aktif.`, icon:'success', background: '#0f172a', color: '#fff', customClass: { popup: 'rounded-3xl' }}).then(() => { localStorage.removeItem('aimoy_master_data'); location.reload(); }); // Reset cache agar terbaca
            } catch(e) { Swal.fire('Error', 'Gagal komunikasi server', 'error').then(() => { isPrompting = false; }); }
        }

        function switchTab(t) { 
            document.getElementById('panel-absen').classList.toggle('hidden', t === 'reg'); 
            document.getElementById('panel-reg').classList.toggle('hidden', t === 'absen'); 
            document.getElementById('tab-absen').classList.toggle('text-blue-400', t === 'absen'); 
            document.getElementById('tab-absen').classList.toggle('text-slate-500', t === 'reg'); 
            document.getElementById('tab-reg').classList.toggle('text-blue-400', t === 'reg'); 
            document.getElementById('tab-reg').classList.toggle('text-slate-500', t === 'absen'); 
            
            // Ubah gaya kotak pembidik saat registrasi
            if(t === 'reg') { document.getElementById('tracking-box').style.opacity = '1'; document.getElementById('tracking-box').style.width = '200px'; document.getElementById('tracking-box').style.height = '200px'; document.getElementById('tracking-box').style.top = '30%'; document.getElementById('tracking-box').style.left = '50%'; document.getElementById('tracking-box').style.transform = 'translate(-50%, -50%)'; document.getElementById('laser').style.display = 'none'; document.getElementById('cam-instruction').innerText = "POSISIKAN WAJAH DI SINI"; document.getElementById('cam-instruction').className = "absolute top-[60%] bg-blue-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest"; }
        }
    </script>
