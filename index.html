    <title>SI-AMoy (Sistem Absensi Aicha Momoyo)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0101">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Si-Amoy">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #1a0101; 
            overflow: hidden; 
            touch-action: manipulation; 
            color: #F8F1E5; 
        }
        
        /* Glass Input Modern */
        .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(248, 241, 229, 0.15); color: #F8F1E5; transition: all 0.3s; }
        .glass-input:focus { border-color: #D4AF37; box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2); outline: none; background: rgba(0, 0, 0, 0.6); }
        .glass-input:disabled { opacity: 0.6; cursor: not-allowed; border-color: rgba(248, 241, 229, 0.05); }
        
        /* Animasi Garis Scanner */
        .scan-line { width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); animation: scan 2s infinite linear; opacity: 0; box-shadow: 0 0 10px #3b82f6; }
        .status-searching .scan-line { opacity: 1; }
        @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(200px); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* SweetAlert2 Premium Dark Mode */
        div:where(.swal2-container) .swal2-popup { border-radius: 2rem !important; border: 1px solid rgba(248, 241, 229, 0.1) !important; background: rgba(26, 1, 1, 0.95) !important; backdrop-filter: blur(20px) !important; color: #F8F1E5 !important; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8) !important; }
        div:where(.swal2-container) .swal2-title, div:where(.swal2-container) .swal2-html-container { color: #F8F1E5 !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
        div:where(.swal2-container) .swal2-input { color: #F8F1E5 !important; border: 1px solid rgba(248, 241, 229, 0.2) !important; border-radius: 1rem !important; background: rgba(0,0,0,0.5) !important; }
        div:where(.swal2-container) .swal2-input:focus { border-color: #D4AF37 !important; }
        
        /* Flash Camera Effect */
        #flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; z-index: 100; pointer-events: none; transition: opacity 0.15s ease-out; }
    </style>
</head>

                <video id="video" class="absolute inset-0 w-full h-full object-cover transform -scale-x-100" autoplay muted playsinline></video>

                <div id="hud-scanner" class="absolute border-2 border-dashed border-white/40 rounded-3xl z-20 flex flex-col justify-between p-2 transition-all duration-100 ease-out box-border" style="left: 20%; top: 20%; width: 60%; height: 60%;">
                    <div class="flex justify-between w-full p-1">
                        <i class="fas fa-expand text-[#F8F1E5]/50 text-xs"></i>
                        <i class="fas fa-compress text-[#F8F1E5]/50 text-xs"></i>

                    <div class="scan-line"></div>

        <div class="shrink-0 bg-[#0a0000]/80 backdrop-blur-xl rounded-t-3xl sm:rounded-b-[2.5rem] border-t border-white/10 relative z-50 mt-[-1.5rem] pt-6 pb-6 px-6 shadow-[0_-15px_30px_rgba(0,0,0,0.5)]">
            
            <div class="flex mb-4 border-b border-white/10">
                <button onclick="switchTab('absen')" id="tab-absen" class="flex-1 py-3 text-[10px] font-black text-[#D4AF37] border-b-2 border-[#D4AF37] transition-all tracking-widest flex items-center justify-center gap-2"><i class="fas fa-clipboard-user text-sm"></i> ABSENSI</button>

                        <i id="outlet-chevron" class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 text-[9px] pointer-events-none"></i>

                        <i class="fas fa-clock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <select id="sel-shift" class="w-full p-3.5 pl-8 glass-input rounded-xl text-[11px] font-bold appearance-none cursor-pointer"><option value="" disabled selected>Shift...</option></select>
                        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 text-[9px] pointer-events-none"></i>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2.5 pt-1">

                </div>
            </div>

            <div id="panel-reg" class="hidden space-y-3 pb-1">
                <div class="bg-white/5 p-3.5 rounded-xl border border-white/10 mb-2">
                    <p class="text-[9px] text-[#e8d5c4] font-bold leading-relaxed text-center"><i class="fas fa-shield-halved text-[#D4AF37] mr-1"></i> Daftarkan wajah staf baru. Pastikan pencahayaan terang dan wajah berada di dalam bingkai.</p>
                </div>
                <div class="relative">
                    <i class="fas fa-id-card absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input type="text" id="reg-nama" placeholder="Nama Lengkap Sesuai KTP" class="w-full p-3.5 pl-8 glass-input rounded-xl text-xs font-bold outline-none placeholder:text-slate-600">
                </div>
                <div class="grid grid-cols-2 gap-2.5">
                    <div class="relative">
                        <i class="fas fa-user-tie absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <select id="reg-role" class="w-full p-3.5 pl-8 glass-input rounded-xl text-[11px] font-bold appearance-none cursor-pointer"><option value="Staff">Jabatan: Staff</option><option value="Senior">Jabatan: Senior</option></select>
                        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 text-[9px] pointer-events-none"></i>
                    </div>
                    <div class="relative">
                        <i class="fas fa-store absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <select id="reg-outlet" class="w-full p-3.5 pl-8 glass-input rounded-xl text-[11px] font-bold appearance-none cursor-pointer"><option value="" disabled selected>Penempatan...</option></select>

    <div id="pwa-install-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999] hidden flex-col justify-end transition-opacity duration-300">
        <div class="bg-[#1a0101] border-t border-[#D4AF37]/30 rounded-t-[2rem] p-6 pb-8 transform translate-y-full transition-transform duration-500 shadow-[0_-20px_50px_rgba(0,0,0,0.8)]" id="pwa-install-sheet">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6"></div>
            <div class="flex items-center gap-4 mb-5">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#D4AF37] to-amber-600 flex items-center justify-center shadow-[0_0_15px_rgba(212,175,55,0.3)] border border-[#D4AF37]/50 shrink-0">
                    <i class="fas fa-fingerprint text-white text-3xl"></i>
                </div>
                <div>
                    <h2 class="text-lg font-black text-[#F8F1E5] leading-tight">Instal Si-Amoy App</h2>
                    <p class="text-[10px] font-bold text-[#e8d5c4]/70 mt-1 uppercase tracking-widest">Akses Cepat & Layar Penuh</p>
                </div>
            </div>
            <div id="pwa-instruction" class="bg-black/50 border border-white/5 rounded-xl p-4 mb-6 text-xs text-[#e8d5c4] font-medium leading-relaxed shadow-inner">
                </div>
            <div class="flex gap-3">
                <button onclick="closePwaPrompt()" class="flex-1 py-3.5 bg-transparent border border-white/20 rounded-xl text-[#F8F1E5] font-bold text-xs hover:bg-white/5 transition-colors tracking-widest uppercase">Nanti Saja</button>
                <button id="pwa-install-btn" class="flex-[2] py-3.5 bg-gradient-to-r from-[#D4AF37] to-amber-600 rounded-xl text-white font-black text-xs shadow-[0_5px_15px_rgba(212,175,55,0.4)] hover:shadow-[0_5px_20px_rgba(212,175,55,0.6)] transition-all tracking-widest uppercase active:scale-95">Instal Sekarang</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxkOCboooYMfJM2W-1WKVu_dHJbfKHdd28TMuxUVkgSotvkf9TERgTQcnXHXDBixEC6kA/exec"; 
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const hudScanner = document.getElementById('hud-scanner');
        
        let faceMatcher = null, currentFace = null, dbOutlet = [], dbShift = [];
        let userLat = 0, userLng = 0, distance = 0, isLocValid = false, lastRecognizedName = null;
        let isPrompting = false, isLivenessPassed = false;
        
        const REQUIRED_SMILE_SCORE = 0.65; 

        window.addEventListener('load', () => {
            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    pos => { 
                        userLat = pos.coords.latitude; 
                        userLng = pos.coords.longitude; 
                        document.getElementById('geo-status').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> GPS TERKUNCI'; 
                        document.getElementById('geo-status').className = "text-emerald-400 text-[9px] tracking-widest font-bold mt-1 uppercase flex items-center gap-1.5"; 
                        cekJarak(); 
                    },
                    err => { Swal.fire('Info Akses', 'GPS tidak diizinkan. Hanya fitur pengajuan IZIN yang akan aktif.', 'info'); }, 
                    { enableHighAccuracy: true }
                );
            }
            setTimeout(initApp, 500);
        });

        function hitungJarak(lat1, lon1, lat2Str, lon2Str) {
            const lat2 = parseFloat(lat2Str), lon2 = parseFloat(lon2Str);
            const R = 6371e3, φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)*Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            Swal.fire({ title: '<span class="text-[#F8F1E5] text-lg font-black">Inisialisasi Sistem...</span>', html: '<span class="text-[#e8d5c4] text-xs">Memuat modul AI biometrik 3D</span>', allowOutsideClick: false, background: 'rgba(26, 1, 1, 0.95)', customClass: { popup: 'swal2-popup' }, didOpen: () => Swal.showLoading() });
            
            const URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await Promise.all([ 
                faceapi.nets.tinyFaceDetector.loadFromUri(URL), 
                faceapi.nets.faceLandmark68Net.loadFromUri(URL), 
                faceapi.nets.faceRecognitionNet.loadFromUri(URL),
                faceapi.nets.faceExpressionNet.loadFromUri(URL) 
            ]);

            try {
                let dataGAS;
                const cachedData = localStorage.getItem('aimoy_master_data');
                const cacheTime = localStorage.getItem('aimoy_master_time');
                
                if (cachedData && cacheTime && (Date.now() - parseInt(cacheTime)) < 12 * 60 * 60 * 1000) {
                    dataGAS = JSON.parse(cachedData);
                    
                    // 🚀 SOLUSI CELAH: Background Sync (Pembaruan Siluman)
                    // Menarik data baru diam-diam tanpa loading screen agar selalu update
                    fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) })
                        .then(r => r.json())
                        .then(freshData => {
                            if(freshData.status === 'ready') {
                                localStorage.setItem('aimoy_master_data', JSON.stringify(freshData));
                                localStorage.setItem('aimoy_master_time', Date.now().toString());
                                dbOutlet = freshData.dataOutlet; 
                                dbShift = freshData.dataShift;
                                if (freshData.dataKaryawan.length > 0) {
                                    const labeled = freshData.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role, o: k.outlet}), [new Float32Array(k.descriptor)]));
                                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.45); // Otak AI langsung di-update
                                }
                            }
                        }).catch(e => console.log("Sync background gagal."));
                        
                } else {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'init' }) });
                    dataGAS = await res.json();
                    localStorage.setItem('aimoy_master_data', JSON.stringify(dataGAS));
                    localStorage.setItem('aimoy_master_time', Date.now().toString());
                }

                dbOutlet = dataGAS.dataOutlet; dbShift = dataGAS.dataShift;

                let outHtml = '<option value="" disabled selected>Pilih Outlet...</option>';
                dbOutlet.forEach(o => { outHtml += `<option value="${o.nama}">${o.nama}</option>`; });
                document.getElementById('sel-outlet').innerHTML = outHtml; document.getElementById('reg-outlet').innerHTML = outHtml;

                if (dataGAS.dataKaryawan.length > 0) {
                    const labeled = dataGAS.dataKaryawan.map(k => new faceapi.LabeledFaceDescriptors(JSON.stringify({n: k.nama, r: k.role, o: k.outlet}), [new Float32Array(k.descriptor)]));
                    faceMatcher = new faceapi.FaceMatcher(labeled, 0.45);
                }
                
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                    .then(s => { video.srcObject = s; Swal.close(); })
                    .catch(e => Swal.fire('Akses Ditolak', 'Kamera harus diizinkan untuk verifikasi biometrik.', 'error'));
            } catch (e) { Swal.fire('Koneksi Gagal', 'Gagal memuat pangkalan data server.', 'error'); }
        }

        function loadShiftDropdown() {
            cekJarak();
            const outletName = document.getElementById('sel-outlet').value;
            const shiftSelect = document.getElementById('sel-shift');
            const shiftTersedia = dbShift.filter(s => s.outlet === outletName);
            
            if(shiftTersedia.length === 0) { shiftSelect.innerHTML = '<option value="" disabled selected>Belum ada jadwal</option>'; } 
            else {
                shiftSelect.innerHTML = '<option value="" disabled selected>Pilih Shift Target...</option>';
                shiftTersedia.forEach(s => { shiftSelect.innerHTML += `<option value="${s.kode}" data-jamm="${s.jamMasuk}" data-jamk="${s.jamKeluar}" data-tol="${s.toleransi}" data-lembur="${s.ambangLembur}">${s.kode} (${s.jamMasuk}-${s.jamKeluar})</option>`; });
            }
        }

        function cariShiftOtomatis(outletName) {
            const shifts = dbShift.filter(s => s.outlet === outletName);
            if (shifts.length === 0) return null;
            
            const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes();
            let bestShift = shifts[0], minDiff = Infinity;

            shifts.forEach(s => {
                const mMasuk = parseInt(s.jamMasuk.split(':')[0]) * 60 + parseInt(s.jamMasuk.split(':')[1]);
                const mKeluar = parseInt(s.jamKeluar.split(':')[0]) * 60 + parseInt(s.jamKeluar.split(':')[1]);
                const closest = Math.min(Math.abs(currentMins - mMasuk), Math.abs(currentMins - mKeluar));
                if(closest < minDiff) { minDiff = closest; bestShift = s; }
            });
            return bestShift;
        }

        function cekJarak() {
            const outName = document.getElementById('sel-outlet').value, alertBox = document.getElementById('dist-alert'), distText = document.getElementById('dist-text');
            if(!outName || userLat === 0) return;

            const outlet = dbOutlet.find(o => o.nama === outName);
            if(!outlet) return; distance = hitungJarak(userLat, userLng, outlet.lat, outlet.lng);
            
            if (distance > outlet.radius) { 
                isLocValid = false; alertBox.classList.remove('hidden'); 
                distText.innerHTML = `Di Luar Radius <b>${outlet.nama}</b>! (Jarak: ${Math.round(distance)}m)`; 
            } else { 
                isLocValid = true; alertBox.classList.add('hidden'); 
            } 
            updateUI(currentFace !== null, isLivenessPassed ? "READY" : "SEARCH");
        }

        video.addEventListener('loadedmetadata', () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; });

        video.addEventListener('play', () => {
            const size = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, size);
            
            setInterval(async () => {
                if(isPrompting) return;

       function ambilFotoKamera(tipe_absen = "FOTO") {
            const tempCanvas = document.createElement('canvas'); 
            const MAX_WIDTH = 360; // Diperlebar sedikit agar teks muat
            const scale = MAX_WIDTH / video.videoWidth; 
            tempCanvas.width = MAX_WIDTH; 
            tempCanvas.height = video.videoHeight * scale;
            const ctx = tempCanvas.getContext('2d'); 
            
            // 1. Cetak Foto (Efek Cermin)
            ctx.save();
            ctx.translate(tempCanvas.width, 0); 
            ctx.scale(-1, 1); 
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            ctx.restore(); // Kembalikan ke normal agar teks watermark tidak terbalik

            // 2. Ambil Data Real-time
            const nama = currentFace ? currentFace.n : "Tidak Dikenal";
            const outlet = document.getElementById('sel-outlet').value || "Lokasi Tidak Diketahui";
            const shift = document.getElementById('sel-shift').value || "-";
            const now = new Date();
            const tglStr = now.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
            const jamStr = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

            // 3. Buat Latar Belakang Transparan untuk Teks di bawah foto
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, tempCanvas.height - 80, tempCanvas.width, 80);

            // 4. Cetak Teks Watermark
            ctx.textAlign = "left";
            ctx.font = "bold 12px sans-serif";
            
            ctx.fillStyle = "#F8F1E5"; // Warna Putih Krem
            ctx.fillText(`[ ${tipe_absen.toUpperCase()} ] • ${tglStr} ${jamStr}`, 12, tempCanvas.height - 58);
            
            ctx.fillStyle = "#D4AF37"; // Warna Emas
            ctx.fillText(`👤 ${nama}`, 12, tempCanvas.height - 38);
            
            ctx.fillStyle = "#10b981"; // Warna Hijau
            ctx.fillText(`🏢 ${outlet}  |  💼 Shift: ${shift}`, 12, tempCanvas.height - 18);

            return tempCanvas.toDataURL('image/jpeg', 0.5); // Kualitas dinaikkan sedikit agar teks tajam
        }

                    const existData = JSON.parse(match.label);
                    isPrompting = false; 
                    return Swal.fire({ icon: 'error', title: '<span class="text-[#F8F1E5]">Registrasi Ditolak</span>', html: `<span class="text-[#e8d5c4] text-xs">Biometrik wajah sudah terdaftar atas nama:</span><br><div class="bg-black/50 rounded-xl py-3 mt-3 font-black text-lg text-[#D4AF37] border border-[#D4AF37]/30 shadow-inner">${existData.n}<br><span class="text-[9px] uppercase font-bold text-[#F8F1E5]/50 block mt-1 tracking-widest">DI ${existData.o}</span></div>`, background: 'rgba(26, 1, 1, 0.95)', customClass: { popup: 'swal2-popup', confirmButton: 'bg-white/10 text-white rounded-xl font-black px-6 py-2.5 text-xs tracking-widest' } });
                }
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'enroll', payload: { nama, role, outlet, descriptor: Array.from(detection.descriptor) } }) });
                const data = await res.json();
                if(data.status === 'success') {
                    Swal.fire({
                        icon: 'success', title: '<span class="text-[#F8F1E5]">Biometrik Terkunci!</span>', html: `<span class="text-[#e8d5c4] text-xs">Akun <b>${nama}</b> resmi diaktifkan di sistem.</span>`, background: 'rgba(26, 1, 1, 0.95)', customClass: { popup: 'swal2-popup', confirmButton: 'bg-emerald-600 text-white rounded-xl font-black px-6 py-2.5 text-xs tracking-widest shadow-lg shadow-emerald-600/30' }
                    }).then(() => {
                        localStorage.removeItem('aimoy_master_data'); 
                        location.reload();
                    });
                }
            } catch(e) { 
                Swal.fire({ icon: 'error', title: '<span class="text-[#F8F1E5]">Gangguan Server</span>', html: '<span class="text-[#e8d5c4] text-xs">Gagal menyimpan ke pangkalan data.</span>', background: 'rgba(26, 1, 1, 0.95)', customClass: { popup: 'swal2-popup', confirmButton: 'bg-white/10 text-white rounded-xl font-black px-6 py-2.5 text-xs tracking-widest' } }).then(() => { isPrompting = false; }); 
            }
        }
        
        function switchTab(t) { 
            const pAbsen = document.getElementById('panel-absen'), pReg = document.getElementById('panel-reg'), tAbsen = document.getElementById('tab-absen'), tReg = document.getElementById('tab-reg');
            if(t === 'reg') { pAbsen.classList.add('hidden'); pReg.classList.remove('hidden'); tReg.classList.add('text-[#D4AF37]', 'border-[#D4AF37]'); tReg.classList.remove('text-slate-500', 'border-transparent'); tAbsen.classList.remove('text-[#D4AF37]', 'border-[#D4AF37]'); tAbsen.classList.add('text-slate-500', 'border-transparent'); } 
            else { pReg.classList.add('hidden'); pAbsen.classList.remove('hidden'); tAbsen.classList.add('text-[#D4AF37]', 'border-[#D4AF37]'); tAbsen.classList.remove('text-slate-500', 'border-transparent'); tReg.classList.remove('text-[#D4AF37]', 'border-[#D4AF37]'); tReg.classList.add('text-slate-500', 'border-transparent'); } 
        }

        // ==========================================
        // 🚀 SISTEM DETEKSI & INSTALASI PWA (NATIVE)
        // ==========================================
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); 
            deferredPrompt = e;
            cekDanTampilkanPwaPrompt();
        });

        window.addEventListener('load', () => {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if(isIOS) setTimeout(cekDanTampilkanPwaPrompt, 2000);
        });

        function cekDanTampilkanPwaPrompt() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');
            if (isStandalone) return; 

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /android/i.test(navigator.userAgent);
            
            const overlay = document.getElementById('pwa-install-overlay');
            const sheet = document.getElementById('pwa-install-sheet');
            const instruction = document.getElementById('pwa-instruction');
            const btnInstall = document.getElementById('pwa-install-btn');

            if (isIOS) {
                instruction.innerHTML = `Apple iOS mengharuskan instalasi manual:<br><br>1. Ketuk ikon <b>Bagikan (Share)</b> <i class="fas fa-arrow-up-from-bracket text-blue-400 mx-1"></i> di menu bawah Safari.<br>2. Gulir ke bawah dan ketuk <b>"Tambah ke Layar Utama"</b> (Add to Home Screen) <i class="fas fa-square-plus text-slate-300 mx-1"></i>.`;
                btnInstall.classList.add('hidden'); 
                tampilkanPwaUI(overlay, sheet);
            } else if (isAndroid && deferredPrompt) {
                instruction.innerHTML = `Instal aplikasi Si-Amoy ke Home Screen Android Anda untuk kinerja kamera yang lebih responsif dan hemat memori.`;
                btnInstall.onclick = async () => {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') closePwaPrompt();
                    deferredPrompt = null;
                };
                tampilkanPwaUI(overlay, sheet);
            }
        }

        function tampilkanPwaUI(overlay, sheet) {
            setTimeout(() => {
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
                setTimeout(() => { sheet.classList.remove('translate-y-full'); }, 50);
            }, 2000);
        }

        function closePwaPrompt() {
            const overlay = document.getElementById('pwa-install-overlay');
            const sheet = document.getElementById('pwa-install-sheet');
            sheet.classList.add('translate-y-full');
            setTimeout(() => {
                overlay.classList.remove('flex');
                overlay.classList.add('hidden');
            }, 400);
        }
    </script>
</body>
</html>
